<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Protocol - Data Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Space Mono', 'monospace'], },
                    colors: { bg: '#0B1120', card: '#151F32', accent: '#10B981', danger: '#EF4444', muted: '#64748B' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B1120; color: #E2E8F0; }
        .input-dark { background: #0F172A; border: 1px solid #334155; color: #E2E8F0; transition: 0.2s; }
        .input-dark:focus { border-color: #10B981; outline: none; box-shadow: 0 0 10px rgba(16,185,129,0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="min-h-screen pb-20">

    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-bg flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="text-center mb-10 fade-in">
            <div class="w-20 h-20 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-accent/50 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                <i class="fas fa-database text-3xl text-accent"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-tighter text-white font-mono uppercase text-white">Finance Protocol</h2>
            <p class="text-muted text-[10px] font-mono mt-2 tracking-[0.3em] animate-pulse">AWAITING_IDENTIFICATION</p>
        </div>
        <button id="googleBtn" class="flex items-center gap-4 bg-white text-bg font-bold px-8 py-4 rounded-xl hover:scale-105 transition-all shadow-xl active:scale-95 group">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            <span class="font-mono">SIGN IN WITH GOOGLE</span>
        </button>
    </div>

    <nav class="border-b border-slate-800 bg-bg/90 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-accent animate-pulse"></div>
                <h1 class="font-bold text-sm tracking-widest font-mono uppercase text-white">WAGER<span class="text-accent">NET</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <img id="uPhoto" class="w-7 h-7 rounded-full border border-slate-700 hidden" alt="User">
                <button onclick="logout()" class="text-slate-500 hover:text-white transition-colors"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 mt-6">
        <div class="bg-slate-900/50 p-1 rounded-xl border border-slate-800 flex shadow-inner">
            <button onclick="switchTab('terminal')" id="tabTerminal" class="flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all bg-accent text-bg uppercase">Terminal View</button>
            <button onclick="switchTab('registry')" id="tabRegistry" class="flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all text-muted uppercase">Registry Table</button>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-4 mt-6 space-y-6">
        
        <div id="viewTerminal" class="space-y-6">
            <div class="bg-card rounded-2xl border border-slate-700 p-5 shadow-2xl fade-in">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-mono text-muted uppercase pl-1">Global Income</label>
                        <input type="number" id="mIncome" value="850000" oninput="triggerRecalculate()" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-mono text-muted uppercase pl-1">Fixed Snack</label>
                        <input type="number" id="mSnack" value="260000" oninput="triggerRecalculate()" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold text-orange-400">
                    </div>
                </div>
            </div>

            <div class="bg-card rounded-2xl border border-slate-700 overflow-hidden shadow-2xl fade-in">
                <div class="p-3 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                    <h2 class="font-mono text-[10px] text-accent tracking-tighter uppercase">Injector_Module</h2>
                    <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                        <button onclick="setMode('auto')" id="modeAuto" class="text-[9px] px-3 py-1 font-bold rounded-md bg-accent text-bg">AUTO</button>
                        <button onclick="setMode('manual')" id="modeManual" class="text-[9px] px-3 py-1 font-bold rounded-md text-muted">MANUAL</button>
                    </div>
                </div>
                <form id="fForm" onsubmit="submitFinance(event)" class="p-5 space-y-4">
                    <input type="text" id="fDesc" placeholder="Protocol Name" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold text-white" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="fAmount" placeholder="Amount (Rp)" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-mono text-white" required>
                        <div id="containerDuration">
                            <select id="fDuration" class="w-full input-dark rounded-xl px-4 py-3 text-xs font-mono text-white"><option value="1">1 MONTH</option><option value="3">3 MONTHS</option><option value="6">6 MONTHS</option><option value="12">12 MONTHS</option></select>
                        </div>
                        <div id="containerMonth" class="hidden">
                            <select id="fTargetMonth" class="w-full input-dark rounded-xl px-4 py-3 text-xs font-mono text-accent font-bold"><option value="0">JANUARI</option><option value="1">FEBRUARI</option><option value="2">MARET</option><option value="3">APRIL</option><option value="4">MEI</option><option value="5">JUNI</option><option value="6">JULI</option><option value="7">AGUSTUS</option><option value="8">SEPTEMBER</option><option value="9">OKTOBER</option><option value="10">NOVEMBER</option><option value="11">DESEMBER</option></select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-accent hover:bg-emerald-400 text-bg font-bold py-4 rounded-xl text-[10px] uppercase tracking-[0.2em] shadow-lg transition-all active:scale-95">Execute_Injection</button>
                </form>
            </div>

            <div id="mBoard" class="space-y-6"></div>
        </div>

        <div id="viewRegistry" class="hidden fade-in">
            <div class="bg-card rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h2 class="font-mono text-[10px] text-accent tracking-widest uppercase">Central_Registry_Protocol</h2>
                </div>
                <div class="overflow-x-auto hide-scroll">
                    <table class="w-full text-left font-mono text-[10px]">
                        <thead class="bg-slate-900/30 text-muted uppercase border-b border-slate-800">
                            <tr>
                                <th class="px-4 py-3">Description</th>
                                <th class="px-4 py-3">Amount</th>
                                <th class="px-4 py-3 text-center">Dur</th>
                                <th class="px-4 py-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="registryTableBody" class="text-white divide-y divide-slate-800/50">
                            </tbody>
                    </table>
                </div>
                <div id="tableEmpty" class="p-10 text-center text-muted text-[10px] uppercase italic hidden">Empty_Dataset</div>
            </div>
        </div>

        <div id="emptyMsg" class="text-center py-20 hidden">
            <p class="text-[10px] font-mono text-muted tracking-widest uppercase italic">No Active Protocols Detected</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTLkvNNwh4LoJuLW1JhsF1S_ZOY1k-PAM",
            authDomain: "webchoice-9b2c0.firebaseapp.com",
            projectId: "webchoice-9b2c0",
            storageBucket: "webchoice-9b2c0.firebasestorage.app",
            messagingSenderId: "754013239435",
            appId: "1:754013239435:web:496f9a5851d0586ee43c8e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const fRef = collection(db, "finance");

        let userUID = null;
        let activeData = [];
        let currentMode = 'auto';
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        // TAB NAVIGATION
        window.switchTab = (tab) => {
            const vTerm = document.getElementById('viewTerminal');
            const vReg = document.getElementById('viewRegistry');
            const bTerm = document.getElementById('tabTerminal');
            const bReg = document.getElementById('tabRegistry');

            if (tab === 'terminal') {
                vTerm.classList.remove('hidden'); vReg.classList.add('hidden');
                bTerm.className = "flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all bg-accent text-bg uppercase";
                bReg.className = "flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all text-muted uppercase";
            } else {
                vTerm.classList.add('hidden'); vReg.classList.remove('hidden');
                bReg.className = "flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all bg-accent text-bg uppercase";
                bTerm.className = "flex-1 py-2 text-[10px] font-bold font-mono rounded-lg transition-all text-muted uppercase";
            }
        }

        window.setMode = (mode) => {
            currentMode = mode;
            document.getElementById('modeAuto').className = mode === 'auto' ? "text-[9px] px-3 py-1 font-bold rounded-md bg-accent text-bg" : "text-[9px] px-3 py-1 font-bold rounded-md text-muted";
            document.getElementById('modeManual').className = mode === 'manual' ? "text-[9px] px-3 py-1 font-bold rounded-md bg-accent text-bg" : "text-[9px] px-3 py-1 font-bold rounded-md text-muted";
            document.getElementById('containerDuration').classList.toggle('hidden', mode === 'manual');
            document.getElementById('containerMonth').classList.toggle('hidden', mode === 'auto');
        }

        // AUTH
        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('loginOverlay');
            if (user) {
                userUID = user.uid;
                overlay.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('uPhoto').src = user.photoURL;
                document.getElementById('uPhoto').classList.remove('hidden');
                startSync(user.uid);
            } else { overlay.classList.remove('opacity-0', 'pointer-events-none'); }
        });

        // ACTIONS
        window.submitFinance = async (e) => {
            e.preventDefault();
            const now = new Date();
            let payload = { desc: document.getElementById('fDesc').value, amount: parseInt(document.getElementById('fAmount').value), uid: userUID, createdAt: new Date(), mode: currentMode };
            if (currentMode === 'auto') {
                let sM = now.getMonth() + 1; let sY = now.getFullYear(); if (sM > 11) { sM = 0; sY++; }
                payload.startM = sM; payload.startY = sY; payload.duration = parseInt(document.getElementById('fDuration').value);
            } else {
                payload.startM = parseInt(document.getElementById('fTargetMonth').value);
                payload.startY = now.getFullYear(); payload.duration = 1;
            }
            await addDoc(fRef, payload);
            document.getElementById('fForm').reset();
        };

        window.deleteEntry = async (id) => {
            if (confirm("Terminate this protocol?")) await deleteDoc(doc(db, "finance", id));
        };

        // SYNC & RENDER
        function startSync(uid) {
            const q = query(fRef, where("uid", "==", uid));
            onSnapshot(q, (snap) => {
                activeData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTerminal();
                renderTable();
            });
        }

        window.triggerRecalculate = () => { renderTerminal(); renderTable(); }

        function renderTable() {
            const tbody = document.getElementById('registryTableBody');
            const emptyTable = document.getElementById('tableEmpty');
            tbody.innerHTML = "";
            if (activeData.length === 0) { emptyTable.classList.remove('hidden'); return; }
            emptyTable.classList.add('hidden');

            activeData.sort((a,b) => a.startM - b.startM).forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td class="px-4 py-4"><p class="font-bold">${item.desc}</p><p class="text-[8px] text-muted uppercase">${item.mode === 'auto' ? 'Auto_Recurring' : 'Manual_Inject'}</p></td>
                        <td class="px-4 py-4 font-bold text-accent">Rp ${item.amount.toLocaleString()}</td>
                        <td class="px-4 py-4 text-center text-slate-400">${item.duration} Mo</td>
                        <td class="px-4 py-4 text-center">
                            <button onclick="deleteEntry('${item.id}')" class="text-danger hover:scale-110 transition-transform px-2 py-1 bg-danger/10 rounded"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function renderTerminal() {
            const board = document.getElementById('mBoard');
            const emptyMsg = document.getElementById('emptyMsg');
            const gIncome = parseInt(document.getElementById('mIncome').value) || 0;
            const gSnack = parseInt(document.getElementById('mSnack').value) || 0;
            board.innerHTML = "";
            let count = 0; const now = new Date();

            for (let i = 0; i < 12; i++) {
                const target = new Date(now.getFullYear(), now.getMonth() + i, 1);
                const curM = target.getMonth(); const curY = target.getFullYear();
                let billTotal = 0; let listHtml = "";

                activeData.forEach(item => {
                    const start = new Date(item.startY, item.startM, 1);
                    const end = new Date(item.startY, item.startM + item.duration, 1);
                    const check = new Date(curY, curM, 1);
                    if (check >= start && check < end) {
                        billTotal += item.amount;
                        listHtml += `<div class="flex justify-between items-center text-[10px] font-mono border-b border-slate-800/30 py-3"><span class="text-slate-400">/ ${item.desc}</span><span class="text-white font-bold">Rp ${item.amount.toLocaleString()}</span></div>`;
                    }
                });

                if (billTotal > 0) {
                    const net = gIncome - (billTotal + gSnack);
                    count++;
                    board.innerHTML += `
                        <div class="bg-card rounded-2xl border border-slate-700 overflow-hidden fade-in shadow-xl">
                            <div class="bg-slate-900/50 px-4 py-3 border-b border-slate-800 flex justify-between items-center"><span class="font-bold text-[10px] text-white font-mono uppercase">${months[curM]} ${curY}</span><i class="fas fa-microchip text-accent text-[8px] animate-pulse"></i></div>
                            <div class="p-5">
                                <div class="space-y-1 mb-5">${listHtml}<div class="flex justify-between items-center text-[10px] font-mono pt-3 text-orange-400"><span>/ FIXED_SNACK</span><span>Rp ${gSnack.toLocaleString()}</span></div></div>
                                <div class="pt-5 border-t border-slate-800 flex justify-between items-end">
                                    <div><p class="text-[8px] text-muted uppercase mb-1">Net_Final</p><p class="text-2xl font-bold ${net < 0 ? 'text-danger' : 'text-accent'} font-mono leading-none">Rp ${net.toLocaleString()}</p></div>
                                    <span class="text-[8px] font-bold px-3 py-1 rounded border ${net < 0 ? 'bg-danger/10 text-danger border-danger/20' : 'bg-accent/10 text-accent border-accent/20'} tracking-widest uppercase">${net < 0 ? 'Deficit' : 'Stable'}</span>
                                </div>
                            </div>
                        </div>`;
                }
            }
            emptyMsg.classList.toggle('hidden', count > 0);
        }
    </script>
</body>
</html>
