<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Ritual : LDM Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;900&display=swap');
        :root { --gold: #c5a059; --charcoal: #050505; --crimson: #dc2626; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--charcoal); 
            color: #e5e7eb; 
            margin: 0; padding: 0;
            position: fixed; width: 100vw; height: 100dvh; overflow: hidden; 
        }
        .serif { font-family: 'Playfair Display', serif; }

        header { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 40; }
        footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #000; border-top: 1px solid rgba(255,255,255,0.05); z-index: 40; }

        .board-wrapper {
            position: absolute;
            top: 110px; bottom: 130px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .board-container {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1.5px;
            width: 100%; max-width: 95vw; max-height: 100%; aspect-ratio: 1/1;
            background: rgba(197, 160, 89, 0.5); 
            padding: 2.5px; border-radius: 6px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.15);
        }

        .cell {
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: #f3f4f6; background: #0a0a0a;
            border-radius: 2px; overflow: hidden;
            text-shadow: 0 0 3px #000, 0 0 5px #000;
        }
        
        .cell-number { z-index: 10; }
        
        .pion {
            width: 12px; height: 12px; border-radius: 50%; position: absolute;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        .pion-cowo { background-color: var(--gold); top: 10%; left: 10%; z-index: 20; }
        .pion-cewe { background-color: var(--crimson); bottom: 10%; right: 10%; z-index: 21; }
        
        .perspective { perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-front { background: var(--gold); cursor: pointer; }
        .card-back { transform: rotateY(180deg); background: #111; border: 2px solid var(--gold); padding: 15px; text-align: center; }
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    </style>
</head>
<body>

    <div id="selection-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
        <h1 class="serif text-4xl text-[#c5a059] mb-10">Identity</h1>
        <div class="flex gap-4 w-full max-w-xs mb-8">
            <div onclick="selectRole('cowo')" id="btn-cowo" class="flex-1 p-5 border border-white/10 rounded-xl flex flex-col items-center gap-3 transition-all bg-white/5 cursor-pointer">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M10 16.5l2 -3l2 3"/></svg>
                <p class="text-[9px] font-black uppercase">Cowo</p>
            </div>
            <div onclick="selectRole('cewe')" id="btn-cewe" class="flex-1 p-5 border border-white/10 rounded-xl flex flex-col items-center gap-3 transition-all bg-white/5 cursor-pointer">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"/><path d="M12 12v.01"/></svg>
                <p class="text-[9px] font-black uppercase">Cewe</p>
            </div>
        </div>
        <button id="start-btn" onclick="startGame()" class="opacity-0 pointer-events-none translate-y-4 transition-all duration-300 bg-[#c5a059] text-black px-12 py-3.5 rounded-full font-black uppercase text-[11px] tracking-widest active:scale-95">Connect</button>
    </div>

    <div id="game-screen" class="hidden h-full w-full">
        <header class="flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <h1 class="serif text-xl text-[#c5a059]">The Ritual (LDM)</h1>
                <button onclick="requestReset()" class="text-[#c5a059] opacity-50 hover:opacity-100 transition-opacity p-2 active:scale-95">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>
            <div class="flex gap-4">
                <div id="ui-cowo" class="text-right opacity-30"><p class="text-[8px] font-bold text-gray-500">COWO</p><p class="text-xs font-black text-[#c5a059]">#<span id="pos-1">1</span></p></div>
                <div id="ui-cewe" class="text-right opacity-30"><p class="text-[8px] font-bold text-gray-500">CEWE</p><p class="text-xs font-black text-red-600">#<span id="pos-2">1</span></p></div>
            </div>
        </header>

        <div class="board-wrapper">
            <div id="board" class="board-container"></div>
        </div>

        <footer class="flex justify-between items-center px-6">
            <p id="turn-info" class="text-[11px] italic text-gray-400">Syncing...</p>
            <div class="flex items-center gap-4">
                <div id="dice-box" class="w-12 h-12 border border-[#c5a059]/40 rounded-lg flex items-center justify-center text-lg font-black text-[#c5a059] bg-white/5 shadow-[0_0_10px_rgba(197,160,89,0.2)]">?</div>
                <button id="roll-btn" onclick="rollDice()" class="bg-[#c5a059] text-black px-8 py-3 rounded-full font-black uppercase text-[11px] tracking-widest disabled:opacity-20 active:scale-95 shadow-lg">Roll</button>
            </div>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/98 flex items-center justify-center p-8 hidden z-50">
        <div class="perspective w-full max-w-[280px] aspect-[3/4]">
            <div id="card-inner" class="card-inner" onclick="flipCard()">
                <div class="card-front"><p class="font-black text-black text-[10px] tracking-widest text-center px-4">TAP TO REVEAL<br><span class="text-[7px] text-gray-800 tracking-normal normal-case">(Klik kartunya)</span></p></div>
                <div class="card-back flex flex-col justify-between py-8">
                    <span class="text-[#c5a059] text-[9px] tracking-[0.3em] uppercase font-bold">Instruction</span>
                    <p id="modal-desc" class="serif text-[18px] leading-snug text-white px-3 my-auto"></p>
                    <button onclick="closeModal()" class="w-full py-3 bg-white text-black rounded-full font-black uppercase text-[9px] active:scale-95">Done & Sync</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-8 hidden z-[60]">
        <div class="border border-[#c5a059] bg-[#0a0a0a] p-8 rounded-2xl text-center w-full max-w-[280px] shadow-[0_0_30px_rgba(197,160,89,0.2)]">
            <h3 class="serif text-2xl text-[#c5a059] mb-4">Reset Ritual?</h3>
            <p id="reset-text" class="text-[11px] text-gray-300 mb-8 leading-relaxed">...</p>
            <div id="reset-actions" class="flex gap-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQzOliNqHDI0ccFc4ha0JrjrZNrh0TPsw",
            authDomain: "rvldx-chat.firebaseapp.com",
            projectId: "rvldx-chat",
            storageBucket: "rvldx-chat.firebasestorage.app",
            messagingSenderId: "1019557266823",
            appId: "1:1019557266823:web:0b36b080f1e735afecbf22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Ganti ID Room khusus untuk versi LDM biar terpisah dari yg tatap muka
        const GAME_ID = "ritual_ldm_v1";

        const allChallenges = [
            "START: Segera Video Call (VC) sekarang!", "VC: Tatap matanya 1 mnt tanpa ngomong", "Kamu maju 2 langkah!", "Kirim VN desahan manja 5 detik", "Dia maju 2 langkah!",
            "Ketik 1 fantasi terliar pas ketemu nanti", "VC: Lepas satu helai pakaian", "Kirim PAP pose paling menggoda", "VC: Puji 3 hal paling seksi dari dia", "VC: Cium layar HP bayangin bibirnya",
            "Kamu mundur 1 langkah", "Kirim PAP bagian tubuh favoritmu (sensor aman)", "VC: Tunjukin pakaian dalam yang dipakai", "BONUS: Lempar dadu 1x lagi", "Kamu maju 1 langkah",
            "VC: Godain pakai lidah/bibir ke kamera 30 dtk", "FREE: Minta dia lakuin 1 hal di VC", "Kirim VN bilang kata-kata kotor", "Dia maju 1 langkah", "VC: Tutup mata & dengerin instruksi dia 1 mnt",
            "Kirim teks janji nakal buat pas ketemu", "VC: Mainin dada sendiri dari luar baju 1 mnt", "Kirim PAP dengan angle dari bawah", "VC: Buka kancing/ritsleting pelan-pelan", "Dia maju 2 langkah",
            "VC: Saling goda 2 mnt tanpa boleh sentuh diri sendiri", "BONUS: Lempar dadu 1x lagi", "Dia maju 1 langkah", "Kamu boleh minta PAP apa aja ke dia", "VC: Masturbasi bareng sambil tatap layar",
            "Kirim VN sebut nama pasangan sambil desah", "VC: Tunjukin area leher sampai dada 10 detik", "Spill gaya sex apa yang paling dikangenin", "Dia harus lepas atasan di VC!", "VC: Mainin diri sendiri 1 mnt sambil diliatin",
            "Kirim PAP setengah telanjang", "Ketik secara detail gimana caramu ngebahagiain dia pas ketemu", "Dia harus lepas atasan di VC!", "VC: Pegang/remas area sensitif sendiri 1 mnt", "VC: Deketin kamera ke area bawah leher 30 dtk",
            "Kamu maju 2 langkah", "VC: Pura-pura ngulum jari sambil tatap kamera", "Kirim VN cerita seksi 1 menit", "Dia harus lepas bawahan di VC!", "VC: Desah senatural mungkin panggil namanya",
            "Kamu mundur 2 langkah", "VC: Usap-usap paha sendiri perlahan", "Gratis dia suruh kamu ngapain aja di VC 2 mnt", "VC: Masturbasi bareng sampai klimaks!", "Kamu mundur 3 langkah",
            "Gratis dia suruh kamu ngapain aja di VC 2 mnt", "Kamu mundur 3 langkah", "FREE: Kamu boleh minta apa aja 3 mnt", "Kirim PAP no sensor (View Once aja!)", "Dia maju 2 langkah",
            "VC: Praktikin gerakan naik turun di kasur", "Ketik bagian tubuh mana yang pengen kamu jilat sekarang", "Kamu maju 1 langkah", "Kirim VN suara kamu lagi mainin diri sendiri", "Kamu mundur 2 langkah",
            "VC: 2 mnt saling tatap sambil sentuh diri sendiri", "BONUS: Lempar dadu 1x lagi", "VC: Matikan lampu, main di kegelapan cuma modal suara", "VC: Taruh HP di kasur, tunjukin gerakanmu", "Kamu maju 1 langkah",
            "Kirim PAP lagi gigit bibir", "VC: Sambil tiduran, mainin area bawah 2 mnt", "Istri nurut apa aja perintah suami di VC 3 mnt", "FREE: Kamu boleh minta apa aja 4 mnt", "BONUS: Lempar dadu 1x lagi",
            "VC: Tunjukin ekspresi paling sange", "Kamu mundur 2 langkah", "VC: Sambil berdiri tunjukin siluet tubuh", "Kirim 3 PAP nakal berturut-turut", "Ceritain hal tergila yang pernah dilakuin bareng",
            "Ceritain hal tergila yang pengen dilakuin bareng", "VC: Kamera di set dari angle bawah paha", "Kirim VN desah kencang 10 detik", "Ketik skenario roleplay buat dimainin sekarang", "Dia maju 2 langkah",
            "VC: Jilat jari kamu pelan-pelan 30 dtk", "Spill mimpimu yang paling jorok tentang dia", "BONUS: Lempar dadu 1x lagi", "Ketik hal yang bikin kamu paling sange soal dia", "Suami nurut perintah istri di VC 2 mnt",
            "VC: Tunjukin posisi tidur favorit kalau lagi sange", "Kirim PAP paling barbar sekarang!", "Minta dia desah panggil namamu di VN", "VC: Blindfold challenge (pakai kain penutup mata)", "Kamu maju 3 langkah",
            "VC: Gerakan maju mundur depan kamera", "Kamu maju 3 langkah", "FREE: Minta dia lepas sisa bajunya!", "VC: Jangan bersuara sama sekali pas lagi main 2 mnt", "VC: Dia yang harus tutup mata",
            "Dia maju 2 langkah", "Ketik pesan panjang tentang rasa kangen secara fisik", "VC: 3 mnt saling main heboh bareng", "Kirim VN klimaks (kamu bebas ngerjainnya gimana)", "FINISH: SIAP-SIAP TUNTASKAN RINDU SAMPAI SUBUH!"
        ];

        let myRole = ""; 
        let state = { p1: 1, p2: 1, turn: 'cowo', lastChallenge: "", lastRoller: "", resetRequest: "" };

        function selectRole(r) {
            myRole = r;
            document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.replace('border-[var(--gold)]', 'border-white/10'));
            document.getElementById(`btn-${r}`).classList.replace('border-white/10', 'border-[var(--gold)]');
            
            const btn = document.getElementById('start-btn');
            btn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
        }

        function startGame() {
            document.getElementById('selection-screen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('selection-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                createBoard();
                listenDB();
            }, 500);
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num = (row % 2 === 0) ? (row * 10) + (col + 1) : (row * 10) + (10 - col);
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.id = `c-${num}`; 
                    
                    let content = `<span class="cell-number">${num}</span>`;
                    let text = allChallenges[num - 1].toLowerCase();
                    
                    if(text.includes('vc') || text.includes('pap') || text.includes('vn')) {
                        content += `<svg class="absolute opacity-70 w-5 h-5 drop-shadow-[0_0_6px_#ff4d4d]" fill="none" stroke="#ff4d4d" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"/><rect x="3" y="6" width="12" height="12" rx="2" stroke-width="2.5"/></svg>`;
                    } else if(text.includes('maju') || text.includes('mundur') || text.includes('bonus')) {
                        content += `<svg class="absolute opacity-80 w-5 h-5 drop-shadow-[0_0_6px_var(--gold)]" fill="none" stroke="var(--gold)" viewBox="0 0 24 24"><path stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>`;
                    } else if(text.includes('lepas') || text.includes('telanjang') || text.includes('pakaian')) {
                        content += `<svg class="absolute opacity-70 w-5 h-5 drop-shadow-[0_0_6px_#ffffff]" fill="none" stroke="#ffffff" viewBox="0 0 24 24"><path stroke-width="2" d="M20.38 3.46L16 2a8.96 8.96 0 0 0-8 0l-4.38 1.46A2 2 0 0 0 2.26 5.3l1.4 6.6a2 2 0 0 0 1.96 1.58h1.22v8.5a2 2 0 0 0 2 2h6.32a2 2 0 0 0 2-2v-8.5h1.22a2 2 0 0 0 1.96-1.58l1.4-6.6a2 2 0 0 0-1.36-1.84z"/></svg>`;
                    } else if(text.includes('ketik') || text.includes('teks') || text.includes('pesan')) {
                        content += `<svg class="absolute opacity-80 w-5 h-5 drop-shadow-[0_0_6px_#ff9f43]" fill="none" stroke="#ff9f43" viewBox="0 0 24 24"><path stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/></svg>`;
                    } else if(num === 100) {
                        content += `<svg class="absolute opacity-100 w-6 h-6 drop-shadow-[0_0_10px_var(--gold)]" fill="none" stroke="var(--gold)" viewBox="0 0 24 24"><path stroke-width="2.5" d="M5 16l-3-7 6 2 4-6 4 6 6-2-3 7H5zM5 16v4h14v-4"/></svg>`;
                    }

                    cell.innerHTML = content;
                    board.appendChild(cell);
                }
            }
        }

        function listenDB() {
            db.collection("games").doc(GAME_ID).onSnapshot((doc) => {
                if (doc.exists) { 
                    state = doc.data(); 
                    syncUI(); 
                } else { 
                    db.collection("games").doc(GAME_ID).set(state); 
                }
            });
        }

        function syncUI() {
            document.getElementById('pos-1').innerText = state.p1;
            document.getElementById('pos-2').innerText = state.p2;
            
            document.querySelectorAll('.pion').forEach(p => p.remove());
            
            const c1 = document.getElementById(`c-${state.p1}`);
            const c2 = document.getElementById(`c-${state.p2}`);
            if(c1) {
                let p1Div = document.createElement('div');
                p1Div.className = 'pion pion-cowo';
                c1.appendChild(p1Div);
            }
            if(c2) {
                let p2Div = document.createElement('div');
                p2Div.className = 'pion pion-cewe';
                c2.appendChild(p2Div);
            }
            
            const btn = document.getElementById('roll-btn');
            const info = document.getElementById('turn-info');
            
            // Format nama giliran di footer
            let turnName = state.turn === 'cowo' ? 'COWO' : 'CEWE';

            if (state.turn === myRole) { 
                btn.disabled = false; 
                info.innerText = "Gilirannya kamu!"; 
                info.style.color = 'var(--gold)'; 
            } else { 
                btn.disabled = true; 
                info.innerText = `Menunggu ${turnName}...`; 
                info.style.color = '#777'; 
            }
            
            document.getElementById('ui-cowo').style.opacity = state.turn === 'cowo' ? "1" : "0.2";
            document.getElementById('ui-cewe').style.opacity = state.turn === 'cewe' ? "1" : "0.2";
            
            if (state.lastChallenge && state.lastChallenge !== "") {
                document.getElementById('modal-desc').innerText = `"${state.lastChallenge}"`;
                document.getElementById('modal').style.display = 'flex';
            } else {
                document.getElementById('modal').style.display = 'none';
                document.getElementById('card-inner').classList.remove('is-flipped');
            }

            // RESET LOGIC
            const resetModal = document.getElementById('reset-modal');
            const resetText = document.getElementById('reset-text');
            const resetActions = document.getElementById('reset-actions');

            if (state.resetRequest && state.resetRequest !== "") {
                resetModal.classList.remove('hidden');
                if (state.resetRequest === myRole) {
                    resetText.innerText = "Menunggu persetujuan pasangan...";
                    resetActions.innerHTML = `<button onclick="cancelReset()" class="w-full py-3 border border-red-500/50 text-red-500 rounded-full font-black uppercase text-[10px] active:scale-95">Batal Request</button>`;
                } else {
                    resetText.innerText = "Pasanganmu mengajak untuk mengulang ritual dari awal. Setuju?";
                    resetActions.innerHTML = `
                        <button onclick="cancelReset()" class="flex-1 py-3 border border-red-500/50 text-red-500 rounded-full font-black uppercase text-[10px] active:scale-95">Tolak</button>
                        <button onclick="confirmReset()" class="flex-1 py-3 bg-[#c5a059] text-black rounded-full font-black uppercase text-[10px] active:scale-95">Setuju</button>
                    `;
                }
            } else {
                resetModal.classList.add('hidden');
            }
        }

        function requestReset() {
            if(state.resetRequest) return; 
            db.collection("games").doc(GAME_ID).update({ resetRequest: myRole });
        }

        function confirmReset() {
            db.collection("games").doc(GAME_ID).update({
                p1: 1, p2: 1, turn: 'cowo', lastChallenge: "", lastRoller: "", resetRequest: ""
            });
        }

        function cancelReset() {
            db.collection("games").doc(GAME_ID).update({ resetRequest: "" });
        }

        function rollDice() {
            const dice = document.getElementById('dice-box');
            dice.classList.add('shake'); dice.innerText = "...";
            setTimeout(() => {
                const roll = Math.floor(Math.random() * 6) + 1;
                dice.innerText = roll; dice.classList.remove('shake');
                
                let np1 = state.p1, np2 = state.p2;
                if (myRole === 'cowo') np1 = Math.min(np1 + roll, 100); 
                else np2 = Math.min(np2 + roll, 100);
                
                let posisiBaru = (myRole === 'cowo') ? np1 : np2;
                const task = allChallenges[posisiBaru - 1]; 

                db.collection("games").doc(GAME_ID).update({ 
                    p1: np1, p2: np2, lastChallenge: task, lastRoller: myRole
                });
            }, 600);
        }

        function flipCard() {
            document.getElementById('card-inner').classList.add('is-flipped');
        }
        
        function closeModal() {
            document.getElementById('card-inner').classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('modal').style.display = 'none';
                
                // === AUTO-MOVE ENGINE BERUNTUN (CHAIN REACTION) ===
                if (state.lastRoller === myRole && state.lastChallenge !== "") {
                    let taskText = state.lastChallenge.toLowerCase();
                    let np1 = state.p1;
                    let np2 = state.p2;
                    let nextTurn = (myRole === 'cowo') ? 'cewe' : 'cowo';
                    let newTask = ""; 
                    let moves = 0;
                    let target = null;

                    // BACA PERINTAH KARTU
                    if (taskText.includes("dia maju")) {
                        let match = taskText.match(/dia maju (\d+)/);
                        if(match) { moves = parseInt(match[1]); target = (myRole === 'cowo' ? 'cewe' : 'cowo'); }
                    } else if (taskText.includes("dia mundur")) {
                        let match = taskText.match(/dia mundur (\d+)/);
                        if(match) { moves = -parseInt(match[1]); target = (myRole === 'cowo' ? 'cewe' : 'cowo'); }
                    } else if (taskText.includes("kamu maju") || taskText.match(/^maju/)) {
                        let match = taskText.match(/maju (\d+)/);
                        if(match) { moves = parseInt(match[1]); target = myRole; }
                    } else if (taskText.includes("kamu mundur") || taskText.match(/^mundur/)) {
                        let match = taskText.match(/mundur (\d+)/);
                        if(match) { moves = -parseInt(match[1]); target = myRole; }
                    }

                    // TAHAN GILIRAN JIKA BONUS DADU
                    if (taskText.includes("lempar dadu")) {
                        nextTurn = myRole; 
                    }

                    // EKSEKUSI CHAIN REACTION JIKA ADA MAJU/MUNDUR
                    if (target !== null && moves !== 0) {
                        if (target === 'cowo') {
                            np1 = Math.min(Math.max(np1 + moves, 1), 100);
                            newTask = allChallenges[np1 - 1]; // Tarik kartu dari kotak baru
                        } else {
                            np2 = Math.min(Math.max(np2 + moves, 1), 100);
                            newTask = allChallenges[np2 - 1]; // Tarik kartu dari kotak baru
                        }
                        
                        // KARENA ADA KARTU BARU, TAHAN GILIRAN DI ROLLER BIAR BISA NUTUP KARTU TERSEBUT
                        nextTurn = myRole;
                    }

                    db.collection("games").doc(GAME_ID).update({ 
                        p1: np1, p2: np2, lastChallenge: newTask, turn: nextTurn 
                    });
                }
            }, 400); // Tunggu animasi tutup kartu sebelum nembak DB
        }
    </script>
</body>
</html>
