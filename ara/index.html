<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kalkulator ARA Saham</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0035c5",
                        "on-primary": "#ffffff",
                        "primary-container": "#0047ff",
                        "background": "#f9f9fd",
                        "surface": "#f9f9fd",
                        "surface-container-low": "#f3f3f7",
                        "surface-container-high": "#e8e8ec",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1a1c1f",
                        "on-surface-variant": "#434657",
                        "outline-variant": "#c4c5da",
                        "success": "#16a34a",
                        "success-bg": "#dcfce7"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; background-color: theme('colors.background'); }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Menghilangkan panah atas-bawah bawaan browser pada input number */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-on-surface antialiased">

<header class="bg-surface/80 backdrop-blur-md flex justify-between items-center px-4 md:px-8 h-16 w-full sticky top-0 z-40 border-b border-outline-variant/20 shadow-sm">
    <button class="text-primary hover:text-primary-container transition-colors duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full">
        <span class="material-symbols-outlined" data-icon="menu">menu</span>
    </button>
    
    <div class="font-headline font-extrabold tracking-widest uppercase text-sm text-on-surface">
        KALKULATOR ARA
    </div>
    
    <div class="w-10 h-10"></div>
</header>

<main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 flex flex-col md:flex-row gap-8 lg:gap-12 items-start">
    
    <section class="w-full md:w-5/12 lg:w-1/3 flex flex-col gap-6 bg-surface-container-lowest p-6 rounded-2xl border border-outline-variant/30 shadow-sm md:sticky md:top-24">
        <h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Parameter Cuan</h1>
        
        <div class="flex flex-col gap-5">
            <div class="flex flex-col gap-1.5">
                <label class="font-body text-sm font-semibold text-on-surface-variant" for="harga-beli">Harga Beli (Rp)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70 font-medium">Rp</span>
                    <input class="bg-surface-container-low text-on-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary pl-11 pr-4 py-3.5 rounded-xl transition-all duration-200 font-body outline-none w-full text-base" id="harga-beli" placeholder="Contoh: 150" type="number"/>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="font-body text-sm font-semibold text-on-surface-variant" for="jumlah-lot">Jumlah Lot</label>
                <div class="relative">
                    <input class="bg-surface-container-low text-on-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3.5 rounded-xl transition-all duration-200 font-body outline-none w-full text-base" id="jumlah-lot" placeholder="Contoh: 100" type="number"/>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70 font-medium">Lot</span>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="font-body text-sm font-semibold text-on-surface-variant" for="jumlah-ara">Target Hari ARA</label>
                <div class="relative">
                    <input class="bg-surface-container-low text-on-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary px-4 py-3.5 rounded-xl transition-all duration-200 font-body outline-none w-full text-base" id="jumlah-ara" placeholder="Contoh: 3" type="number"/>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70 font-medium">Hari</span>
                </div>
            </div>
        </div>

        <button onclick="hitungAra()" class="mt-4 bg-primary text-on-primary font-headline font-bold text-base py-4 px-6 rounded-xl hover:bg-primary-container transition-all duration-200 active:scale-95 w-full flex items-center justify-center gap-2 shadow-md shadow-primary/20">
            Hitung Potensi Cuan
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
    </section>

    <section class="w-full md:w-7/12 lg:w-2/3 flex flex-col gap-6">
        
        <div class="bg-gradient-to-br from-primary to-primary-container rounded-3xl p-6 md:p-8 flex flex-col gap-2 shadow-lg shadow-primary/10 relative overflow-hidden">
            <div class="absolute -top-32 -right-32 w-80 h-80 bg-white/10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
            
            <h2 class="font-label text-xs font-bold tracking-widest uppercase text-on-primary/80 mb-1">Estimasi Cuan Bersih</h2>
            <div class="font-headline text-4xl md:text-5xl lg:text-[3.5rem] font-bold tracking-tight leading-none text-on-primary truncate" id="hero-cuan">
                Rp 0
            </div>
            
            <div class="flex items-center gap-2 mt-4 text-on-primary bg-white/15 w-fit px-3 py-1.5 rounded-full backdrop-blur-md border border-white/10" id="hero-percent">
                <span class="material-symbols-outlined text-sm">trending_up</span>
                <span class="font-body text-sm font-semibold">0% Kenaikan</span>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-surface-container-lowest rounded-2xl p-5 border border-outline-variant/30 flex flex-col gap-1.5 shadow-sm">
                <span class="font-label text-xs font-bold tracking-widest uppercase text-on-surface-variant">Modal Awal</span>
                <span class="font-headline text-xl md:text-2xl font-bold text-on-surface truncate" id="modal-awal">Rp 0</span>
            </div>
            <div class="bg-surface-container-lowest rounded-2xl p-5 border border-outline-variant/30 flex flex-col gap-1.5 shadow-sm">
                <span class="font-label text-xs font-bold tracking-widest uppercase text-on-surface-variant">Total Saldo Akhir</span>
                <span class="font-headline text-xl md:text-2xl font-bold text-on-surface truncate" id="saldo-akhir">Rp 0</span>
            </div>
        </div>

        <div class="bg-surface-container-lowest rounded-2xl p-6 flex flex-col gap-6 border border-outline-variant/30 shadow-sm hidden" id="breakdown-container">
            <h3 class="font-headline text-xl font-bold tracking-tight text-on-surface">Rincian per Hari ARA</h3>
            <div class="flex flex-col gap-4" id="daily-breakdown">
                </div>
        </div>

    </section>
</main>

<script>
    // Fungsi format rupiah tanpa desimal
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);

    function hitungAra() {
        const inputHarga = parseFloat(document.getElementById('harga-beli').value);
        const inputLot = parseInt(document.getElementById('jumlah-lot').value);
        const inputAra = parseInt(document.getElementById('jumlah-ara').value);

        if (!inputHarga || !inputLot || !inputAra) {
            alert('Lengkapi semua data terlebih dahulu ya!');
            return;
        }

        const modalAwal = inputHarga * inputLot * 100;
        let currentPrice = inputHarga;
        let htmlRows = '';

        for (let i = 1; i <= inputAra; i++) {
            // Menentukan batas persentase ARA BEI Simetris
            let persenAra = currentPrice > 5000 ? 0.20 : (currentPrice > 200 ? 0.25 : 0.35);
            
            // Menghitung harga teoritis sebelum disesuaikan dengan fraksi
            let hargaMax = currentPrice + (currentPrice * persenAra);

            // Penentuan Fraksi Harga (Tick Size BEI)
            let fraksi = 1;
            if (hargaMax < 200) fraksi = 1;
            else if (hargaMax < 500) fraksi = 2;
            else if (hargaMax < 2000) fraksi = 5;
            else if (hargaMax < 5000) fraksi = 10;
            else fraksi = 25;

            // Harga ARA final dibulatkan ke bawah sesuai fraksi terdekat
            let hargaAraFinal = Math.floor(hargaMax / fraksi) * fraksi;
            let saldoHariIni = hargaAraFinal * inputLot * 100;

            htmlRows += `
                <div class="flex flex-row justify-between items-center pb-4 border-b border-outline-variant/20 last:border-0 last:pb-0">
                    <div class="flex flex-col gap-1.5">
                        <span class="font-label text-[10px] sm:text-xs font-bold tracking-widest uppercase text-on-surface-variant">HARI KE-${i}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-body text-sm sm:text-base text-on-surface">
                                Harga: <strong class="font-headline text-base sm:text-lg">Rp ${hargaAraFinal.toLocaleString('id-ID')}</strong>
                            </span>
                            <span class="bg-success-bg text-success text-[10px] sm:text-xs px-2 py-1 rounded-md font-bold border border-success/20">
                                +${(persenAra*100)}%
                            </span>
                        </div>
                    </div>
                    <div class="text-right flex flex-col gap-1">
                        <span class="font-label text-[10px] sm:text-xs font-bold tracking-widest uppercase text-on-surface-variant">SALDO</span>
                        <div class="font-headline text-base sm:text-lg font-bold text-primary">${formatRp(saldoHariIni)}</div>
                    </div>
                </div>
            `;

            // Update currentPrice untuk perhitungan hari selanjutnya
            currentPrice = hargaAraFinal;
        }

        const totalSaldoAkhir = currentPrice * inputLot * 100;
        const totalCuan = totalSaldoAkhir - modalAwal;
        const totalPersenCuan = (totalCuan / modalAwal) * 100;

        // Tampilkan Hasil ke DOM
        document.getElementById('modal-awal').innerText = formatRp(modalAwal);
        document.getElementById('saldo-akhir').innerText = formatRp(totalSaldoAkhir);
        
        document.getElementById('hero-cuan').innerText = formatRp(totalCuan);
        document.getElementById('hero-percent').innerHTML = `
            <span class="material-symbols-outlined text-sm">trending_up</span>
            <span class="font-body text-sm font-semibold">+${totalPersenCuan.toFixed(2)}% Total Cuan</span>
        `;

        document.getElementById('daily-breakdown').innerHTML = htmlRows;
        
        // Memunculkan kontainer rincian
        document.getElementById('breakdown-container').classList.remove('hidden');
    }
</script>
</body>
</html>
