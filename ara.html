<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kalkulator ARA Saham</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0035c5",
                        "on-primary": "#ffffff",
                        "background": "#f9f9fd",
                        "on-background": "#1a1c1f",
                        "outline-variant": "#c4c5da",
                        "surface-container-high": "#e8e8ec",
                        "surface-container-low": "#f3f3f7",
                        "surface": "#f9f9fd",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#0047ff",
                        "on-surface": "#1a1c1f",
                        "on-surface-variant": "#434657",
                        "success": "#16a34a"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: max(884px, 100dvh); }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Hilangkan panah spinner di input number */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased pb-24 md:pb-0">

<header class="bg-[#f9f9fd] dark:bg-slate-950 backdrop-blur-md bg-opacity-80 flex justify-between items-center px-6 h-16 w-full sticky top-0 z-40 border-b border-outline-variant/15">
    <button class="text-[#0047FF] hover:text-[#0035c5] transition-colors duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full">
        <span class="material-symbols-outlined" data-icon="menu">menu</span>
    </button>
    <div class="font-['Manrope'] font-bold tracking-tight uppercase text-sm text-slate-900 tracking-widest">
        KALKULATOR ARA
    </div>
    <button class="text-[#0047FF] hover:text-[#0035c5] transition-colors duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full">
        <span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
    </button>
</header>

<main class="max-w-5xl mx-auto px-6 py-8 md:py-12 flex flex-col md:flex-row gap-8 lg:gap-12 items-start pl-6 md:pl-32">
    
    <section class="w-full md:w-5/12 flex flex-col gap-8 bg-surface-container-low p-6 md:p-8 rounded-xl shadow-sm border border-outline-variant/15">
        <h1 class="font-headline text-[1.5rem] font-semibold tracking-[-0.01em] text-on-surface mb-2">Parameter Trade</h1>
        
        <div class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="font-body text-[1.125rem] font-medium text-on-surface-variant" for="harga-beli">Harga Beli (Rp)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70">Rp</span>
                    <input class="bg-surface-container-high text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 pl-12 pr-4 py-3 rounded-t-lg transition-colors duration-200 font-body outline-none w-full appearance-none" id="harga-beli" placeholder="Contoh: 150 (Harga WBSA)" type="number"/>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="font-body text-[1.125rem] font-medium text-on-surface-variant" for="jumlah-lot">Jumlah Lot</label>
                <div class="relative">
                    <input class="bg-surface-container-high text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 rounded-t-lg transition-colors duration-200 font-body outline-none w-full appearance-none" id="jumlah-lot" placeholder="Contoh: 77" type="number"/>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70 text-sm">Lot</span>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="font-body text-[1.125rem] font-medium text-on-surface-variant" for="jumlah-ara">Target Hari ARA</label>
                <div class="relative">
                    <input class="bg-surface-container-high text-on-surface border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-4 py-3 rounded-t-lg transition-colors duration-200 font-body outline-none w-full appearance-none" id="jumlah-ara" placeholder="Contoh: 3" type="number"/>
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 font-body text-on-surface-variant/70 text-sm">Hari</span>
                </div>
            </div>
        </div>

        <button onclick="hitungAra()" class="mt-4 bg-primary text-on-primary font-body font-medium text-base py-4 px-6 rounded-xl hover:bg-primary-container transition-colors duration-200 ease-out-expo active:scale-[0.98] w-full flex items-center justify-center gap-2 shadow-md">
            Hitung Potensi Cuan
            <span class="material-symbols-outlined text-[1.25rem]">arrow_forward</span>
        </button>
    </section>

    <section class="w-full md:w-7/12 flex flex-col gap-6">
        
        <div class="bg-gradient-to-br from-primary to-primary-container rounded-2xl p-8 flex flex-col gap-2 shadow-[0_8px_32px_0_rgba(0,35,197,0.15)] relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-white/10 rounded-full blur-3xl pointer-events-none"></div>
            
            <h2 class="font-label text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-primary/80 mb-1">Estimasi Cuan Bersih</h2>
            <div class="font-headline text-[3rem] md:text-[3.5rem] font-bold tracking-[-0.02em] leading-none text-on-primary" id="hero-cuan">
                Rp 0
            </div>
            
            <div class="flex items-center gap-2 mt-4 text-on-primary/90 bg-white/15 w-fit px-4 py-2 rounded-full backdrop-blur-sm" id="hero-percent">
                <span class="material-symbols-outlined text-sm">trending_up</span>
                <span class="font-body text-sm font-medium">0% Gain</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-lowest rounded-xl p-5 border border-outline-variant/20 flex flex-col gap-1">
                <span class="font-label text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Modal Awal (Capital)</span>
                <span class="font-headline text-[1.25rem] font-bold text-on-surface" id="modal-awal">Rp 0</span>
            </div>
            <div class="bg-surface-container-lowest rounded-xl p-5 border border-outline-variant/20 flex flex-col gap-1">
                <span class="font-label text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Total Saldo Akhir</span>
                <span class="font-headline text-[1.25rem] font-bold text-on-surface" id="saldo-akhir">Rp 0</span>
            </div>
        </div>

        <div class="bg-surface-container-lowest rounded-xl p-6 flex flex-col gap-6 border border-outline-variant/20 shadow-sm hidden" id="breakdown-container">
            <h3 class="font-headline text-[1.25rem] font-semibold tracking-[-0.01em] text-on-surface">Rincian per Hari ARA</h3>
            <div class="flex flex-col gap-4" id="daily-breakdown">
                </div>
        </div>

    </section>
</main>

<aside class="hidden md:flex flex-col fixed left-0 top-16 bottom-0 w-24 bg-surface border-r border-outline-variant/15 py-8 items-center gap-8 z-30">
    <a class="flex flex-col items-center justify-center text-primary font-bold bg-surface-container-low p-3 rounded-xl w-20 text-center relative" href="#">
        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-primary rounded-r-full"></div>
        <span class="material-symbols-outlined mb-1 text-2xl" data-icon="calculate" style="font-variation-settings: 'FILL' 1;">calculate</span>
        <span class="font-label text-[0.625rem] font-bold uppercase tracking-widest">ARA</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant font-medium hover:bg-surface-container-low transition-colors duration-200 p-3 rounded-xl w-20 text-center" href="#">
        <span class="material-symbols-outlined mb-1 text-2xl" data-icon="analytics">analytics</span>
        <span class="font-label text-[0.625rem] font-bold uppercase tracking-widest">MARKET</span>
    </a>
</aside>

<nav class="md:hidden bg-white fixed bottom-0 w-full z-50 border-t border-outline-variant/15 shadow-[0_-4px_20px_0_rgba(0,0,0,0.03)] flex justify-around items-center h-20 pb-safe px-4">
    <a class="flex flex-col items-center justify-center text-primary font-extrabold p-2 rounded-lg flex-1" href="#">
        <span class="material-symbols-outlined mb-1" data-icon="calculate" style="font-variation-settings: 'FILL' 1;">calculate</span>
        <span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">ARA</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant font-medium p-2 rounded-lg flex-1" href="#">
        <span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
        <span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">MARKET</span>
    </a>
</nav>

<script>
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

    function hitungAra() {
        const inputHarga = parseFloat(document.getElementById('harga-beli').value);
        const inputLot = parseInt(document.getElementById('jumlah-lot').value);
        const inputAra = parseInt(document.getElementById('jumlah-ara').value);

        if (!inputHarga || !inputLot || !inputAra) {
            alert('Harap isi semua parameter terlebih dahulu.');
            return;
        }

        const modalAwal = inputHarga * inputLot * 100;
        let currentPrice = inputHarga;
        let htmlRows = '';

        for (let i = 1; i <= inputAra; i++) {
            // Persentase ARA BEI
            let persenAra = currentPrice > 5000 ? 0.20 : (currentPrice > 200 ? 0.25 : 0.35);
            
            // Harga Max Teoritis
            let hargaMax = currentPrice + (currentPrice * persenAra);

            // Penentuan Fraksi Harga (Tick Size BEI)
            let fraksi = 1;
            if (hargaMax < 200) fraksi = 1;
            else if (hargaMax < 500) fraksi = 2;
            else if (hargaMax < 2000) fraksi = 5;
            else if (hargaMax < 5000) fraksi = 10;
            else fraksi = 25;

            // Harga ARA final dibulatkan ke bawah sesuai fraksi
            let hargaAraFinal = Math.floor(hargaMax / fraksi) * fraksi;
            let saldoHariIni = hargaAraFinal * inputLot * 100;

            htmlRows += `
                <div class="flex justify-between items-end pb-4 border-b border-outline-variant/15 last:border-0 last:pb-0">
                    <div class="flex flex-col gap-1">
                        <span class="font-label text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Hari ke-${i}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-body text-[0.875rem] text-on-surface">Harga: <strong class="font-headline">Rp ${hargaAraFinal.toLocaleString('id-ID')}</strong></span>
                            <span class="bg-success/10 text-success text-[0.65rem] px-2 py-0.5 rounded font-bold">+${(persenAra*100)}%</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="font-label text-[0.6875rem] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Saldo</span>
                        <div class="font-headline text-[1.125rem] font-bold text-primary">${formatRp(saldoHariIni)}</div>
                    </div>
                </div>
            `;

            currentPrice = hargaAraFinal;
        }

        const totalSaldoAkhir = currentPrice * inputLot * 100;
        const totalCuan = totalSaldoAkhir - modalAwal;
        const totalPersenCuan = (totalCuan / modalAwal) * 100;

        // Render Data ke DOM
        document.getElementById('modal-awal').innerText = formatRp(modalAwal);
        document.getElementById('saldo-akhir').innerText = formatRp(totalSaldoAkhir);
        
        document.getElementById('hero-cuan').innerText = formatRp(totalCuan);
        document.getElementById('hero-percent').innerHTML = `
            <span class="material-symbols-outlined text-sm">trending_up</span>
            <span class="font-body text-sm font-medium">+${totalPersenCuan.toFixed(2)}% Keseluruhan</span>
        `;

        document.getElementById('daily-breakdown').innerHTML = htmlRows;
        document.getElementById('breakdown-container').classList.remove('hidden');
    }
</script>
</body>
</html>
