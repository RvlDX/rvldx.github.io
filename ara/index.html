<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ARA Calculator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-dark: #0f1115;
            --panel-dark: #181a20;
            --border-dark: #2b3139;
            --accent-green: #0ecb81;
            --accent-blue: #2962ff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #EAECEF;
            min-height: 100vh;
        }
        .font-mono-num { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar untuk Terminal Vibe */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #474d57; }

        /* Sembunyikan panah input number */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .glass-panel {
            background: var(--panel-dark);
            border: 1px solid var(--border-dark);
        }
        
        /* Timeline styling */
        .timeline-dot::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(14, 203, 129, 0.5);
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center py-6 md:py-10 px-4 sm:px-6">

    <header class="w-full max-w-5xl mb-8 flex justify-center md:justify-start items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(41,98,255,0.4)]">
            A
        </div>
        <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white">ARA<span class="text-gray-400 font-medium">PRO</span></h1>
    </header>

    <main class="w-full max-w-5xl flex flex-col md:flex-row gap-6 lg:gap-8">
        
        <aside class="w-full md:w-5/12 lg:w-1/3 flex flex-col gap-6">
            <div class="glass-panel rounded-2xl p-6 shadow-xl sticky top-6">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-6">Parameter Trading</h2>
                
                <div class="flex flex-col gap-5">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-300" for="harga-beli">Harga Entry</label>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-gray-500 font-mono-num">Rp</span>
                            <input class="w-full bg-[#0b0e14] border border-[#2b3139] text-white font-mono-num text-lg rounded-xl pl-12 pr-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" id="harga-beli" placeholder="0" type="number"/>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-300" for="jumlah-lot">Volume (Lot)</label>
                        <div class="relative flex items-center">
                            <input class="w-full bg-[#0b0e14] border border-[#2b3139] text-white font-mono-num text-lg rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" id="jumlah-lot" placeholder="0" type="number"/>
                            <span class="absolute right-4 text-gray-500 text-sm">Lot</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium text-gray-300" for="jumlah-ara">Target Hari ARA</label>
                        <div class="relative flex items-center">
                            <input class="w-full bg-[#0b0e14] border border-[#2b3139] text-white font-mono-num text-lg rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" id="jumlah-ara" placeholder="1-10" type="number"/>
                            <span class="absolute right-4 text-gray-500 text-sm">Hari</span>
                        </div>
                    </div>
                </div>

                <button onclick="hitungAra()" class="mt-8 w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-base py-4 rounded-xl transition-all duration-200 active:scale-[0.98] shadow-[0_4px_20px_rgba(41,98,255,0.3)]">
                    Kalkulasi Profit
                </button>
            </div>
        </aside>

        <section class="w-full md:w-7/12 lg:w-2/3 flex flex-col gap-6">
            
            <div class="glass-panel rounded-2xl p-6 md:p-8 relative overflow-hidden flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="absolute top-0 right-0 w-64 h-64 bg-[#0ecb81] opacity-5 rounded-full blur-3xl pointer-events-none -translate-y-1/2 translate-x-1/3"></div>
                
                <div class="flex flex-col gap-2 z-10 w-full">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400">Estimasi Net Profit</h2>
                    <div class="text-4xl md:text-5xl font-bold text-[#0ecb81] font-mono-num tracking-tight" id="hero-cuan">
                        Rp 0
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="bg-[#0ecb81] bg-opacity-10 text-[#0ecb81] border border-[#0ecb81]/20 text-xs font-bold px-2.5 py-1 rounded-md font-mono-num" id="hero-percent">
                            +0.00%
                        </span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 md:gap-6">
                <div class="glass-panel rounded-2xl p-5 md:p-6 flex flex-col gap-1.5 border-l-4 border-l-gray-600">
                    <span class="text-xs font-semibold uppercase tracking-wider text-gray-500">Capital (Modal)</span>
                    <span class="text-lg md:text-xl font-bold text-white font-mono-num" id="modal-awal">Rp 0</span>
                </div>
                <div class="glass-panel rounded-2xl p-5 md:p-6 flex flex-col gap-1.5 border-l-4 border-l-blue-600">
                    <span class="text-xs font-semibold uppercase tracking-wider text-gray-500">Total Asset (Saldo)</span>
                    <span class="text-lg md:text-xl font-bold text-white font-mono-num" id="saldo-akhir">Rp 0</span>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6 md:p-8 hidden" id="breakdown-container">
                <h3 class="text-base font-semibold text-white mb-6 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    Proyeksi Kenaikan Harga
                </h3>
                
                <div class="relative border-l border-[#2b3139] ml-2 pl-6 flex flex-col gap-6" id="daily-breakdown">
                    </div>
            </div>

        </section>
    </main>

<script>
    const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);

    function hitungAra() {
        const inputHarga = parseFloat(document.getElementById('harga-beli').value);
        const inputLot = parseInt(document.getElementById('jumlah-lot').value);
        const inputAra = parseInt(document.getElementById('jumlah-ara').value);

        if (!inputHarga || !inputLot || !inputAra) {
            alert('Harap isi Harga Entry, Volume Lot, dan Target Hari.');
            return;
        }

        const modalAwal = inputHarga * inputLot * 100;
        let currentPrice = inputHarga;
        let htmlRows = '';

        for (let i = 1; i <= inputAra; i++) {
            // Aturan Persentase ARA BEI Simetris
            let persenAra = currentPrice >= 5000 ? 0.20 : (currentPrice >= 200 ? 0.25 : 0.35);
            let hargaMax = currentPrice + (currentPrice * persenAra);

            // Penentuan Fraksi Harga (Tick Size BEI)
            let fraksi = 1;
            if (hargaMax < 200) fraksi = 1;
            else if (hargaMax < 500) fraksi = 2;
            else if (hargaMax < 2000) fraksi = 5;
            else if (hargaMax < 5000) fraksi = 10;
            else fraksi = 25;

            // Dibulatkan ke bawah sesuai fraksi BEI
            let hargaAraFinal = Math.floor(hargaMax / fraksi) * fraksi;
            let saldoHariIni = hargaAraFinal * inputLot * 100;

            htmlRows += `
                <div class="relative timeline-dot">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 sm:gap-0 bg-[#0b0e14] border border-[#2b3139] p-4 rounded-xl hover:border-gray-600 transition-colors">
                        
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] sm:text-xs font-bold text-gray-500 uppercase tracking-wider">HARI KE-${i}</span>
                            <div class="flex items-end gap-3">
                                <span class="text-white font-mono-num text-lg font-bold">Rp ${hargaAraFinal.toLocaleString('id-ID')}</span>
                                <span class="text-[#0ecb81] text-xs font-bold mb-1 border border-[#0ecb81]/30 bg-[#0ecb81]/10 px-1.5 py-0.5 rounded">
                                    +${(persenAra*100)}%
                                </span>
                            </div>
                        </div>

                        <div class="flex flex-col items-start sm:items-end w-full sm:w-auto mt-2 sm:mt-0 pt-2 sm:pt-0 border-t border-[#2b3139] sm:border-0">
                            <span class="text-[10px] sm:text-xs font-bold text-gray-500 uppercase tracking-wider">EST. ASSET</span>
                            <span class="text-gray-300 font-mono-num text-sm sm:text-base font-semibold">${formatRp(saldoHariIni)}</span>
                        </div>
                    </div>
                </div>
            `;

            currentPrice = hargaAraFinal;
        }

        const totalSaldoAkhir = currentPrice * inputLot * 100;
        const totalCuan = totalSaldoAkhir - modalAwal;
        const totalPersenCuan = (totalCuan / modalAwal) * 100;

        // Render hasil ke UI
        document.getElementById('modal-awal').innerText = formatRp(modalAwal);
        document.getElementById('saldo-akhir').innerText = formatRp(totalSaldoAkhir);
        document.getElementById('hero-cuan').innerText = formatRp(totalCuan);
        document.getElementById('hero-percent').innerText = `+${totalPersenCuan.toFixed(2)}% TOTAL KANTONG`;
        document.getElementById('daily-breakdown').innerHTML = htmlRows;
        
        // Tampilkan animasi transisi kontainer
        const breakdownContainer = document.getElementById('breakdown-container');
        breakdownContainer.classList.remove('hidden');
        breakdownContainer.style.opacity = 0;
        setTimeout(() => {
            breakdownContainer.style.transition = 'opacity 0.5s ease';
            breakdownContainer.style.opacity = 1;
        }, 50);
    }
</script>
</body>
</html>
