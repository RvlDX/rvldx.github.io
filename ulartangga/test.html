    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;900&display=swap');
        :root { --gold: #c5a059; --charcoal: #050505; --crimson: #dc2626; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--charcoal); 
            color: #e5e7eb; 
            margin: 0; padding: 0;
            min-height: 100dvh; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        .serif { font-family: 'Playfair Display', serif; }

        .board-container {
            position: relative;
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px;
            width: 100%; max-width: 95vw; 
            aspect-ratio: 1/1;
            background: rgba(197, 160, 89, 0.4); 
            padding: 2px; border-radius: 8px;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.15);
            margin: auto;
        }

        @media (min-width: 1024px) {
            .board-container { max-width: 65vh; max-height: 65vh; }
        }

        #svg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.8));
        }

        .cell {
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; color: #f3f4f6; 
            border-radius: 3px; overflow: hidden; 
            text-shadow: 0 0 3px #000, 0 0 5px #000; z-index: 10; text-align: center;
        }
        
        .cell-number { z-index: 20; position: relative; opacity: 0.6; }
        
        .pion {
            width: 24px; height: 24px; border-radius: 50%; position: absolute;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
        }
        
        /* CSS FIX UNTUK SVG BIDAK BIAR PROPORSIONAL */
        .pion svg { width: 70%; height: 70%; display: block; }
        
        .pion-cowo { background-color: var(--gold); top: 2%; left: 2%; z-index: 30; color: #000; }
        .pion-cewe { background-color: var(--crimson); bottom: 2%; right: 2%; z-index: 31; color: #fff; }

        @keyframes jump {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.3); }
            100% { transform: translateY(0) scale(1); }
        }
        .is-jumping { animation: jump 0.6s ease-in-out; }
        
        .perspective { perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-front { background: var(--gold); cursor: pointer; border: 4px solid rgba(0,0,0,0.1); background-image: radial-gradient(circle at top right, rgba(255,255,255,0.2), transparent); }
        .card-back { transform: rotateY(180deg); background: #111; border: 2px solid var(--gold); padding: 20px; text-align: center; }
        
        @keyframes dicePop {
            0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .dice-anim { animation: dicePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes snakeSlither {
            0% { stroke-dashoffset: 200; }
            100% { stroke-dashoffset: 0; }
        }
        .path-snake { stroke-dasharray: 200; animation: snakeSlither 2s ease-out forwards; }
    </style>
</head>

            "VIDEO CALL: Telepon dia sekarang, kalian harus 'main' bareng lewat kamera (Minimal 30 Menit).", 
            "KAMU: Kamu harus turuti skenario roleplay apapun dari dia selama 10 menit.", 
            "FREE: Kamu boleh minta 1 video rekaman nakal khusus dari dia.", 
            "BONUS: Lempar dadu 1x lagi!",
            "KAMU: VN dengan suara paling sange: 'Bunda / Tsuma sayang, aku pengen banget dimanjain sama kamu sekarang...'", 
            "MUNDUR 2 LANGKAH", 
            "KAMU: Kirim 3 foto selfie berturut-turut dengan ekspresi paling menggoda.", 
            "VIDEO: Rekam detik-detik kamu ngelepas SEMUA baju depan kamera pelan-pelan.", 
            "KAMU: Kirim VN rintihan paling seksi yang bisa kamu buat sekarang.",
            "KAMU: Kapan terakhir kali kamu self-service sambil ngebayangin muka dia?", 
            "KAMU: Kirim pap sebagian kecil pakaian dalam yang lagi dipake (teasing edge).", 
            "KAMU: Sebutin satu fantasi liar yang pengen kamu lakuin tapi malu bilang ke dia.", 
            "DIA MAJU 2 LANGKAH", 
            "VIDEO: Bikin video 1 menit ngelakuin apa aja yang dia ketik di chat sekarang.",
            "KAMU: Kamu lebih suka dia main kasar (dominan) atau lembut pelan-pelan?", 
            "BONUS: Lempar dadu 1x lagi!", 
            "VIDEO: Rekam kamu lagi memanjakan/menyentuh dirimu sendiri (self-service) pelan-pelan selama 1 menit.", 
            "KAMU: Kirim VN bisikan kata 'I'm yours' berkali-kali di dekat mic.", 
            "VIDEO: Rekam dan tunjukin area yang jadi favorit dia di tubuhmu selama 30 detik.",
            "KAMU: Kirim pap lidah kamu (pose seksi/teasing).", 
            "KAMU: Kalau rindu ini ada wujudnya, seberapa besar wujudnya sekarang?", 
            "VIDEO CALL: VC 5 menit, tunjukin langsung gimana cara kamu muasin diri sendiri pakai tangan.", 
            "MAJU 3 LANGKAH", 
            "KAMU: Pakai es batu (atau air dingin), usap ke area sensitifmu, dan rekam reaksinya 15 detik!",
            "MAJU 3 LANGKAH", 
            "FREE: Minta video dia lagi ngelakuin satu hal spesifik yang kamu mau.", 
            "VIDEO CALL: Telepon dia 1 jam penuh. Kalian bebas ngapain aja, ini waktu privasi penuh!", 
            "VIDEO: Saling kirim video 30 detik pamerin area bawah (teasing).", 
            "DIA MAJU 2 LANGKAH",
            "KAMU: Apa ketakutan terbesar kamu tentang hubungan LDM ini yang mau kamu lewatin bareng dia?", 
            "KAMU: Kirim satu video koleksi pribadi paling berani yang pernah kamu simpan buat dia.", 
            "KAMU: Kirim VN bilang 'Sayang, aku udah nggak tahan pengen kamu sekarang...'", 
            "FREE: Ini permintaan mutlak! Kamu bebas minta 1 hal terakhir yang HARUS dia turuti.", 
            "FINISH: VIDEO CALL SEKARANG! Saling tatap, ungkapin janji bakal setia, dan berikan klimaks manis bareng!"
        ];

        const ladders = { 4: 25, 13: 46, 33: 49, 50: 69, 42: 63, 62: 81, 74: 92 };
        const snakes = { 27: 5, 40: 3, 43: 18, 54: 31, 66: 45, 76: 58, 89: 53, 99: 41 };

        let myRole = ""; 
        let randomTurn = Math.random() < 0.5 ? 'cowo' : 'cewe'; 
        let state = { p1: 1, p2: 1, turn: randomTurn, lastChallenge: "", lastRoller: "", resetRequest: "", icon_cowo: "king", icon_cewe: "queen" };
        let localPlayerMoving = false;

        function selectRole(r) {
            myRole = r;
            document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.remove('border-[#c5a059]', 'bg-[#c5a059]/20', 'scale-105'));
            document.getElementById(`btn-${r}`).classList.add('border-[#c5a059]', 'bg-[#c5a059]/20', 'scale-105');
            document.getElementById('start-btn').classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
        }

        // FUNGSI RENDER MENU UBAH PION (HANYA UNTUK ROLE SENDIRI)
        function renderPieceMenu() {
            let menuHTML = "";
            Object.keys(svgPieces).forEach(key => {
                menuHTML += `
                    <div onclick="changePiece('${key}')" id="menu-piece-${myRole}-${key}" class="w-10 h-10 p-2 flex items-center justify-center border border-transparent rounded-lg cursor-pointer transition-all text-white/40 hover:text-white hover:bg-white/10">
                        ${svgPieces[key]}
                    </div>
                `;
            });
            
            // Masukkan ke dalam kotak skor milik user
            document.getElementById(`piece-menu-${myRole}`).innerHTML = menuHTML;
            document.getElementById(`piece-menu-${myRole}`).classList.remove('hidden');
        }

        function changePiece(iconKey) {
            // Update ke firebase langsung
            db.collection("games").doc(GAME_ID).update({
                ['icon_' + myRole]: iconKey
            });
        }

        function startGame() {
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            createBoard();
            renderPieceMenu(); // Panggil menu pion saat game mulai
            
            // Set default icon jika belum ada
            db.collection("games").doc(GAME_ID).set({
                ['icon_' + myRole]: myRole === 'cowo' ? 'king' : 'queen'
            }, { merge: true });

            listenDB();
        }

        function getCoords(num) {
            let row = Math.floor((num - 1) / 10);
            let col = (num - 1) % 10;
            if (row % 2 !== 0) col = 9 - col;
            let x = (col * 10) + 5;
            let y = 95 - (row * 10);
            return {x, y};
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '<svg id="svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none;"></svg>';

            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num = (row % 2 === 0) ? (row * 10) + (col + 1) : (row * 10) + (10 - col);
                    const cell = document.createElement('div');
                    
                    let isDark = (row + col) % 2 === 0;
                    let bgClass = isDark ? 'bg-[#151515]/90' : 'bg-[#c5a059]/10';
                    
                    cell.className = `cell ${bgClass}`; cell.id = `c-${num}`; 
                    cell.innerHTML = `<span class="cell-number">${num}</span>`;
                    board.appendChild(cell);
                }
            }

            let svgHTML = '';
            
            Object.keys(ladders).forEach(start => {
                let s = getCoords(parseInt(start)); let e = getCoords(ladders[start]);
                svgHTML += `<line x1="${s.x-1.5}" y1="${s.y}" x2="${e.x-1.5}" y2="${e.y}" stroke="#d97706" stroke-width="1.2" opacity="0.9"/>`;
                svgHTML += `<line x1="${s.x+1.5}" y1="${s.y}" x2="${e.x+1.5}" y2="${e.y}" stroke="#d97706" stroke-width="1.2" opacity="0.9"/>`;
                for(let i=1; i<6; i++) {
                    let mx = s.x + (e.x - s.x) * (i/6); let my = s.y + (e.y - s.y) * (i/6);
                    let angle = Math.atan2(e.y - s.y, e.x - s.x) + Math.PI/2;
                    let rx1 = mx + Math.cos(angle)*1.5; let ry1 = my + Math.sin(angle)*1.5;
                    let rx2 = mx - Math.cos(angle)*1.5; let ry2 = my - Math.sin(angle)*1.5;
                    svgHTML += `<line x1="${rx1}" y1="${ry1}" x2="${rx2}" y2="${ry2}" stroke="#d97706" stroke-width="1" opacity="0.9"/>`;
                }
            });

            Object.keys(snakes).forEach(start => {
                let s = getCoords(parseInt(start)); let e = getCoords(snakes[start]);   
                let dx = e.x - s.x;
                let dy = e.y - s.y;
                let angle = Math.atan2(dy, dx);
                let nx = -Math.sin(angle);
                let ny = Math.cos(angle);
                let amp = 4; 
                
                let cx1 = s.x + dx*0.3 + nx*amp;
                let cy1 = s.y + dy*0.3 + ny*amp;
                let cx2 = s.x + dx*0.7 - nx*amp;
                let cy2 = s.y + dy*0.7 - ny*amp;

                svgHTML += `<path class="path-snake" d="M ${s.x} ${s.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${e.x} ${e.y}" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>`;
                
                let headAngle = Math.atan2(cy1 - s.y, cx1 - s.x) * 180 / Math.PI;
                svgHTML += `<g transform="translate(${s.x}, ${s.y}) rotate(${headAngle})">
                    <path d="M -2.5,0 L -4.5,-1 M -2.5,0 L -4.5,1" stroke="#fca5a5" stroke-width="0.5" fill="none"/>
                    <ellipse cx="0" cy="0" rx="2.5" ry="1.8" fill="#dc2626" />
                    <circle cx="-0.8" cy="-1" r="0.4" fill="#000"/>
                    <circle cx="-0.8" cy="1" r="0.4" fill="#000"/>
                </g>`;
            });

            document.getElementById('svg-overlay').innerHTML = svgHTML;
        }

        let previousTurn = "";

        function listenDB() {
            db.collection("games").doc(GAME_ID).onSnapshot((doc) => {
                if (doc.exists) { 
                    const data = doc.data();
                    if(previousTurn !== "" && previousTurn !== data.turn && !localPlayerMoving) {
                        showTurnToast(data.turn);
                    }
                    previousTurn = data.turn;
                    syncUI(data); 
                } else { 
                    db.collection("games").doc(GAME_ID).set(state); 
                }
            });
        }

        function showTurnToast(turn) {
            const toast = document.getElementById('turn-toast');
            toast.innerText = turn === myRole ? "GILIRAN KAMU SEKARANG" : `GILIRAN DIA (${turn.toUpperCase()})`;
            toast.style.opacity = "1";
            toast.style.transform = "translate(-50%, 0)";
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translate(-50%, -1rem)";
            }, 3000);
        }

        function syncUI(newData) {
            const pos1Changed = state.p1 !== newData.p1;
            const pos2Changed = state.p2 !== newData.p2;
            state = newData;

            document.getElementById('pos-1').innerText = state.p1;
            document.getElementById('pos-2').innerText = state.p2;
            
            // Render icon ke UI Skor
            document.getElementById('icon-display-cowo').innerHTML = svgPieces[state.icon_cowo] || svgPieces['king'];
            document.getElementById('icon-display-cewe').innerHTML = svgPieces[state.icon_cewe] || svgPieces['queen'];

            // Update UI Menu Pion (Kasih warna ke bidak yg sedang aktif)
            if (document.getElementById(`piece-menu-${myRole}`)) {
                let myCurrentIcon = state['icon_' + myRole] || (myRole === 'cowo' ? 'king' : 'queen');
                document.querySelectorAll(`#piece-menu-${myRole} div`).forEach(el => {
                    el.classList.remove('border-[#c5a059]', 'bg-[#c5a059]/20', 'text-[#c5a059]');
                });
                let activeBtn = document.getElementById(`menu-piece-${myRole}-${myCurrentIcon}`);
                if(activeBtn) activeBtn.classList.add('border-[#c5a059]', 'bg-[#c5a059]/20', 'text-[#c5a059]');
            }

            // Render Pion di Papan
            document.querySelectorAll('.pion').forEach(p => p.remove());
            const c1 = document.getElementById(`c-${state.p1}`);
            const c2 = document.getElementById(`c-${state.p2}`);
            
            if(c1) { 
                let p1Div = document.createElement('div'); 
                p1Div.className = 'pion pion-cowo' + (pos1Changed ? ' is-jumping' : ''); 
                p1Div.innerHTML = svgPieces[state.icon_cowo] || svgPieces['king'];
                c1.appendChild(p1Div); 
            }
            if(c2) { 
                let p2Div = document.createElement('div'); 
                p2Div.className = 'pion pion-cewe' + (pos2Changed ? ' is-jumping' : ''); 
                p2Div.innerHTML = svgPieces[state.icon_cewe] || svgPieces['queen'];
                c2.appendChild(p2Div); 
            }
            
            const btn = document.getElementById('roll-btn');
            const info = document.getElementById('turn-info');
            
            if (state.turn === myRole) { 
                btn.disabled = false; 
                info.innerText = "Giliran Kamu!"; 
                info.className = "text-[#c5a059] text-[12px] font-black uppercase tracking-widest text-center";
                document.getElementById(myRole === 'cowo' ? 'ui-cowo' : 'ui-cewe').classList.add('border-[#c5a059]', 'shadow-[0_0_15px_rgba(197,160,89,0.3)]');
                document.getElementById(myRole === 'cowo' ? 'ui-cewe' : 'ui-cowo').classList.remove('border-[#c5a059]', 'shadow-[0_0_15px_rgba(197,160,89,0.3)]');
            } else { 
                btn.disabled = true; 
                info.innerText = `Giliran ${state.turn.toUpperCase()}`; 
                info.className = "text-gray-500 text-[12px] font-bold uppercase tracking-widest text-center";
                document.getElementById(myRole === 'cowo' ? 'ui-cewe' : 'ui-cowo').classList.add('border-[#dc2626]', 'shadow-[0_0_15px_rgba(220,38,38,0.3)]');
                document.getElementById(myRole === 'cowo' ? 'ui-cowo' : 'ui-cewe').classList.remove('border-[#dc2626]', 'shadow-[0_0_15px_rgba(220,38,38,0.3)]');
            }
            
            if (state.lastChallenge && state.lastChallenge !== "") {
                document.getElementById('modal-desc').innerText = state.lastChallenge;
                document.getElementById('modal').classList.remove('hidden');
            } else {
                document.getElementById('modal').classList.add('hidden');
                document.getElementById('card-inner').classList.remove('is-flipped');
            }

            const resetModal = document.getElementById('reset-modal');
            if (state.resetRequest && state.resetRequest !== "") {
                resetModal.classList.remove('hidden');
                if (state.resetRequest === myRole) {
                    document.getElementById('reset-text').innerText = "Menunggu persetujuan dia untuk reset...";
                    document.getElementById('reset-actions').innerHTML = `<button onclick="cancelReset()" class="w-full py-4 border border-red-500/50 text-red-500 rounded-full font-black text-[11px] uppercase tracking-wider">BATAL</button>`;
                } else {
                    document.getElementById('reset-text').innerText = "Pasanganmu mengajak mengulang ritual dari awal. Setuju?";
                    document.getElementById('reset-actions').innerHTML = `
                        <button onclick="cancelReset()" class="flex-1 py-4 border border-red-500/50 text-red-500 rounded-full font-black text-[11px] uppercase tracking-wider">TOLAK</button>
                        <button onclick="confirmReset()" class="flex-1 py-4 bg-[#c5a059] text-black rounded-full font-black text-[11px] uppercase tracking-wider">SETUJU</button>`;
                }
            } else { resetModal.classList.add('hidden'); }
        }

        // ==========================================
        // FUNGSI INI SAJA YANG DIUBAH UNTUK LOMPAT 1 PER 1
        // ==========================================
        function rollDice() {
            localPlayerMoving = true;
            const diceOverlay = document.getElementById('dice-overlay');
            const bigDice = document.getElementById('big-dice');
            const rollerName = document.getElementById('roller-name');
            
            rollerName.innerText = `Kamu sedang mengocok...`;
            diceOverlay.classList.remove('hidden');
            bigDice.classList.remove('dice-anim');
            
            let rollInterval = setInterval(() => {
                bigDice.innerText = Math.floor(Math.random() * 6) + 1;
            }, 50);
            
            setTimeout(() => {
                clearInterval(rollInterval);
                const roll = Math.floor(Math.random() * 6) + 1;
                bigDice.innerText = roll; 
                bigDice.classList.add('dice-anim');
                
                let startPos = (myRole === 'cowo') ? state.p1 : state.p2;
                let targetPos = Math.min(startPos + roll, 100);
                
                setTimeout(async () => {
                    diceOverlay.classList.add('hidden');
                    db.collection("games").doc(GAME_ID).update({ lastChallenge: "", lastRoller: myRole });

                    // LOOPING UPDATE KE FIREBASE AGAR PION LOMPAT SATU PER SATU
                    for (let p = startPos + 1; p <= targetPos; p++) {
                        if (myRole === 'cowo') await db.collection("games").doc(GAME_ID).update({ p1: p });
                        else await db.collection("games").doc(GAME_ID).update({ p2: p });
                        await new Promise(r => setTimeout(r, 400)); // Jeda 400ms tiap kotak
                    }

                    setTimeout(() => {
                        let finalPos = targetPos;
                        if (ladders[targetPos]) finalPos = ladders[targetPos];
                        else if (snakes[targetPos]) finalPos = snakes[targetPos];

                        let updateData = { lastChallenge: allChallenges[finalPos - 1] };
                        if (myRole === 'cowo') updateData.p1 = finalPos;
                        else updateData.p2 = finalPos;

                        db.collection("games").doc(GAME_ID).update(updateData);
                        localPlayerMoving = false;
                    }, 400); // Jeda sejenak sebelum ngecek ular/tangga
                }, 1000);

            }, 800);
        }

        function flipCard() { 
            document.getElementById('card-inner').classList.add('is-flipped'); 
        }

        // ==========================================
        // FUNGSI INI JUGA DIBUAT LOMPAT 1 PER 1 SAAT EFEK KARTU
        // ==========================================
        function closeModal() {
            document.getElementById('card-inner').classList.remove('is-flipped');
            
            setTimeout(async () => {
                if (state.lastRoller === myRole) {
                    let nextTurn = (myRole === 'cowo') ? 'cewe' : 'cowo';
                    let text = state.lastChallenge.toUpperCase();
                    let np1 = state.p1, np2 = state.p2;
                    let chainMove = 0;
                    let opponentMove = 0;

                    if (text.includes("KAMU MAJU 2") || text.includes("MAJU 2 LANGKAH")) chainMove = 2;
                    else if (text.includes("KAMU MAJU 3") || text.includes("MAJU 3 LANGKAH")) chainMove = 3;
                    else if (text.includes("KAMU MAJU 1") || text.includes("MAJU 1 LANGKAH")) chainMove = 1;
                    else if (text.includes("KAMU MUNDUR 1") || text.includes("MUNDUR 1 LANGKAH")) chainMove = -1;
                    else if (text.includes("KAMU MUNDUR 2") || text.includes("MUNDUR 2 LANGKAH")) chainMove = -2;
                    else if (text.includes("KAMU MUNDUR 3") || text.includes("MUNDUR 3 LANGKAH")) chainMove = -3;
                    else if (text.includes("DIA MAJU 1") || text.includes("DIA MAJU 2")) {
                        opponentMove = text.includes("DIA MAJU 2") ? 2 : 1;
                    }

                    if (text.includes("BONUS")) nextTurn = myRole;
                    
                    db.collection("games").doc(GAME_ID).update({ lastChallenge: "" });

                    if (chainMove !== 0) {
                        let startPos = myRole === 'cowo' ? state.p1 : state.p2;
                        let targetPos = Math.max(1, Math.min(startPos + chainMove, 100));
                        let step = chainMove > 0 ? 1 : -1;

                        for (let p = startPos + step; step > 0 ? p <= targetPos : p >= targetPos; p += step) {
                            if (myRole === 'cowo') await db.collection("games").doc(GAME_ID).update({ p1: p });
                            else await db.collection("games").doc(GAME_ID).update({ p2: p });
                            await new Promise(r => setTimeout(r, 400));
                        }
                        
                        let currentPos = targetPos;
                        if (ladders[currentPos]) currentPos = ladders[currentPos];
                        else if (snakes[currentPos]) currentPos = snakes[currentPos];
                        
                        let finalUpdate = { lastChallenge: allChallenges[currentPos - 1] };
                        if (myRole === 'cowo') finalUpdate.p1 = currentPos;
                        else finalUpdate.p2 = currentPos;

                        db.collection("games").doc(GAME_ID).update(finalUpdate);
                        return; 
                    }

                    if (opponentMove !== 0) {
                        let oppRole = myRole === 'cowo' ? 'cewe' : 'cowo';
                        let startPos = oppRole === 'cowo' ? state.p1 : state.p2;
                        let targetPos = Math.min(startPos + opponentMove, 100);

                        for (let p = startPos + 1; p <= targetPos; p++) {
                            if (oppRole === 'cowo') await db.collection("games").doc(GAME_ID).update({ p1: p });
                            else await db.collection("games").doc(GAME_ID).update({ p2: p });
                            await new Promise(r => setTimeout(r, 400));
                        }

                        let currentPos = targetPos;
                        if (ladders[currentPos]) currentPos = ladders[currentPos];
                        else if (snakes[currentPos]) currentPos = snakes[currentPos];

                        let finalUpdate = { turn: nextTurn };
                        if (oppRole === 'cowo') finalUpdate.p1 = currentPos;
                        else finalUpdate.p2 = currentPos;

                        db.collection("games").doc(GAME_ID).update(finalUpdate);
                        return;
                    }

                    db.collection("games").doc(GAME_ID).update({ p1: np1, p2: np2, lastChallenge: "", turn: nextTurn });
                }
            }, 400);
        }

        function requestReset() { db.collection("games").doc(GAME_ID).update({ resetRequest: myRole }); }
        function cancelReset() { db.collection("games").doc(GAME_ID).update({ resetRequest: "" }); }
        function confirmReset() { 
            let randomTurn = Math.random() < 0.5 ? 'cowo' : 'cewe'; 
            db.collection("games").doc(GAME_ID).set({ p1: 1, p2: 1, turn: randomTurn, lastChallenge: "", lastRoller: "", resetRequest: "" }, { merge: true }); 
        }
    </script>
