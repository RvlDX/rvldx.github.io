<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Ritual 🔥: LDM Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;900&display=swap');
        :root { --gold: #c5a059; --charcoal: #050505; --crimson: #dc2626; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--charcoal); 
            color: #e5e7eb; 
            margin: 0; padding: 0;
            position: fixed; width: 100vw; height: 100dvh; overflow: hidden; 
        }
        .serif { font-family: 'Playfair Display', serif; }

        header { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 40; }
        footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #000; border-top: 1px solid rgba(255,255,255,0.05); z-index: 40; }

        .board-wrapper {
            position: absolute;
            top: 80px; bottom: 100px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .board-container {
            position: relative;
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1.5px;
            width: 100%; max-width: 95vw; max-height: 100%; aspect-ratio: 1/1;
            background: rgba(197, 160, 89, 0.4); 
            padding: 2.5px; border-radius: 6px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.15);
        }

        #svg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.9));
        }

        .cell {
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: #f3f4f6; background: #0a0a0a;
            border-radius: 2px; overflow: hidden;
            text-shadow: 0 0 3px #000, 0 0 5px #000; z-index: 10; text-align: center;
        }
        
        .cell-number { z-index: 20; position: relative; opacity: 0.8;}
        
        .pion {
            width: 14px; height: 14px; border-radius: 50%; position: absolute;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid #fff; box-shadow: 0 0 12px rgba(0,0,0,1);
        }
        .pion-cowo { background-color: var(--gold); top: 8%; left: 8%; z-index: 30; }
        .pion-cewe { background-color: var(--crimson); bottom: 8%; right: 8%; z-index: 31; }
        
        .perspective { perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-front { background: var(--gold); cursor: pointer; border: 4px solid rgba(0,0,0,0.1); }
        .card-back { transform: rotateY(180deg); background: #111; border: 2px solid var(--gold); padding: 20px; text-align: center; }
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    </style>
</head>
<body>

    <div id="selection-screen" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-6 text-center">
        <h1 class="serif text-4xl text-[#c5a059] mb-4">The Ritual</h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-widest mb-10">Truth or Dare LDM Edition</p>
        <div class="flex gap-4 w-full max-w-xs mb-8">
            <div onclick="selectRole('cowo')" id="btn-cowo" class="flex-1 p-5 border border-white/10 rounded-xl flex flex-col items-center gap-3 transition-all bg-white/5 cursor-pointer">
                <p class="text-[10px] font-black uppercase">Pihak Cowo</p>
            </div>
            <div onclick="selectRole('cewe')" id="btn-cewe" class="flex-1 p-5 border border-white/10 rounded-xl flex flex-col items-center gap-3 transition-all bg-white/5 cursor-pointer">
                <p class="text-[10px] font-black uppercase">Pihak Cewe</p>
            </div>
        </div>
        <button id="start-btn" onclick="startGame()" class="opacity-0 pointer-events-none translate-y-4 transition-all duration-300 bg-[#c5a059] text-black px-12 py-3.5 rounded-full font-black uppercase text-[11px] tracking-widest active:scale-95">Mulai Ritual</button>
    </div>

    <div id="game-screen" class="hidden h-full w-full">
        <header class="flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <h1 class="serif text-lg text-[#c5a059]">Truth or Dare</h1>
                <button onclick="requestReset()" class="text-white/20 hover:text-white/100 p-2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>
            <div class="flex gap-4">
                <div id="ui-cowo" class="text-right opacity-30"><p class="text-[8px] font-bold text-gray-500">COWO</p><p class="text-xs font-black text-[#c5a059]">#<span id="pos-1">1</span></p></div>
                <div id="ui-cewe" class="text-right opacity-30"><p class="text-[8px] font-bold text-gray-500">CEWE</p><p class="text-xs font-black text-red-600">#<span id="pos-2">1</span></p></div>
            </div>
        </header>

        <div class="board-wrapper">
            <div id="board" class="board-container">
                <svg id="svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
            </div>
        </div>

        <footer class="flex justify-between items-center px-6">
            <p id="turn-info" class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Syncing...</p>
            <div class="flex items-center gap-4">
                <div id="dice-box" class="w-12 h-12 border border-[#c5a059]/40 rounded-lg flex items-center justify-center text-lg font-black text-[#c5a059] bg-white/5">?</div>
                <button id="roll-btn" onclick="rollDice()" class="bg-[#c5a059] text-black px-8 py-3 rounded-full font-black uppercase text-[11px] tracking-widest disabled:opacity-20">Roll</button>
            </div>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/98 flex items-center justify-center p-8 hidden z-50">
        <div class="perspective w-full max-w-[280px] aspect-[3/4]">
            <div id="card-inner" class="card-inner" onclick="flipCard()">
                <div class="card-front"><p class="font-black text-black text-[12px] tracking-widest">TAP TO REVEAL</p></div>
                <div class="card-back flex flex-col justify-between py-8">
                    <span id="card-type" class="text-[#c5a059] text-[10px] tracking-[0.3em] uppercase font-black">RITUAL</span>
                    <p id="modal-desc" class="serif text-[18px] leading-snug text-white px-3 my-auto"></p>
                    <button onclick="closeModal()" class="w-full py-3 bg-white text-black rounded-full font-black uppercase text-[10px]">Selesai & Sync</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-8 hidden z-[60]">
        <div class="border border-[#c5a059] bg-[#0a0a0a] p-8 rounded-2xl text-center w-full max-w-[280px]">
            <h3 class="serif text-2xl text-[#c5a059] mb-4">Reset?</h3>
            <p id="reset-text" class="text-[11px] text-gray-300 mb-8">...</p>
            <div id="reset-actions" class="flex gap-4"></div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Tetap menggunakan punya kamu)
        const firebaseConfig = {
            apiKey: "AIzaSyBQzOliNqHDI0ccFc4ha0JrjrZNrh0TPsw",
            authDomain: "rvldx-chat.firebaseapp.com",
            projectId: "rvldx-chat",
            storageBucket: "rvldx-chat.firebasestorage.app",
            messagingSenderId: "1019557266823",
            appId: "1:1019557266823:web:0b36b080f1e735afecbf22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const GAME_ID = "ritual_ldm_tor_v1";

        const allChallenges = [
            "START: Kirim pap wajah tercantik/terganteng sekarang!", "TRUTH: Apa kesan pertama kamu pas awal kenal aku?", "DARE: VN desah pelan panggil nama aku 5 detik", "TRUTH: Hal apa dari aku yang paling sering bikin kamu kangen?", "MAJU 2 LANGKAH!",
            "DARE: Cari foto aku yang paling kamu suka, jadiin wallpaper HP (ss kirim!)", "TRUTH: Kapan terakhir kali kamu horny gara-gara mikirin aku?", "DARE: Kirim pap telapak tangan kamu, aku pengen bayangin pegangan tangan", "MUNDUR 1 LANGKAH", "TRUTH: Bagian tubuh aku yang mana yang paling pengen kamu gigit?",
            "DARE: VN bilang 'I Love You' pake suara paling manja/deep", "DARE: Rekam video 10 detik kamu lagi elus-elus rambut sendiri", "DIA MAJU 2 LANGKAH", "TRUTH: Pernah nggak kamu mimpiin aku yang 'aneh-aneh'?", "MAJU 1 LANGKAH",
            "FREE: Kamu boleh minta 1 PAP apa aja ke aku!", "DARE: Kirim pap bibir kamu (pose kiss/gigit bibir)", "TRUTH: Sebutin 3 hal yang bakal kita lakuin pertama kali pas ketemu nanti", "DIA MAJU 1 LANGKAH", "DARE: Ketik 1 paragraf 'dirty talk' yang pengen kamu lakuin ke aku",
            "TRUTH: Apa baju yang paling cocok menurut kamu kalau aku pake?", "DARE: VN suara kamu pas lagi bangun tidur", "DARE: Rekam video 15 detik tatap kamera tanpa kedip sambil senyum nakal", "DARE: Buka satu kancing baju paling atas, terus pap!", "DIA MAJU 2 LANGKAH",
            "TRUTH: Siapa yang lebih sering sange kalau lagi VC-an?", "BONUS: Lempar dadu 1x lagi!", "DIA MAJU 1 LANGKAH", "FREE: Kamu bebas kasih perintah apa aja ke aku (durasi 5 menit)", "VC SEKARANG: Tunjukin muka bantal/muka sange kamu selama 1 menit",
            "TRUTH: Kamu lebih suka aku pake parfum bau manis atau maskulin?", "DARE: Kirim VN suara kamu lagi gigit jari/nahan desah", "TRUTH: Apa hal paling nakal yang pernah kamu bayangin bareng aku?", "DARE: Kirim pap leher kamu sekarang, pengen aku kasih tanda di situ", "DARE: Rekam video singkat kamu lagi bisikin hal kotor ke mic",
            "TRUTH: Kalau kita cuma punya waktu 1 jam di kamar, mau ngapain aja?", "DARE: Pap jari manis kamu, bayangin aku lagi pasang cincin di situ", "DARE: Lepas satu pakaian yang lagi kamu pake sekarang!", "MUNDUR 2 LANGKAH", "MAJU 2 LANGKAH",
            "TRUTH: Pernah nggak kamu cemburu sama orang yang deket sama aku?", "DARE: Kirim video 10 detik kamu lagi cium layar HP (bayangin itu aku)", "VC 3 MENIT: Saling tatap-tatapan tanpa ngomong apa-apa", "DARE: Kirim pap paha kamu dikit aja", "TRUTH: Apa rahasia tentang tubuh kamu yang belum aku tau?",
            "MUNDUR 2 LANGKAH", "DARE: Tulis nama aku di bagian tubuh kamu pake pulpen, terus pap!", "FREE: Minta aku kirim pap bagian tubuh favorit kamu", "VC: Kamu harus nurutin semua omongan aku selama 3 menit", "MUNDUR 3 LANGKAH",
            "DARE: Kirim pap mata kamu dari deket (pake flash)", "MUNDUR 3 LANGKAH", "FREE: Minta 1 PAP dari aku", "DARE: Rekam video kamu lagi usap-usap dada sendiri pelan-pelan", "DIA MAJU 2 LANGKAH",
            "TRUTH: Posisi favorit kamu kalau kita nanti tidur bareng?", "DARE: VN bilang 'Sayang, aku mau...' (lanjutin sendiri)", "MAJU 1 LANGKAH", "DARE: Rekam video singkat kamu lagi gigit kaos/baju kamu", "MUNDUR 2 LANGKAH",
            "TRUTH: Apa sifat aku yang paling bikin kamu turn-on?", "BONUS: Lempar dadu 1x lagi!", "DARE: Kirim video nakal singkat (minimal 5 detik)", "VC: Tunjukin area sensitif kamu selama 10 detik", "MAJU 1 LANGKAH",
            "TRUTH: Pernah kepikiran buat selingkuh nggak pas kita LDR?", "VC: Kita 'main' bareng lewat kamera sampai salah satu puas", "DARE: Kamu harus nurut apa aja kata aku selama 10 menit", "FREE: Kamu boleh minta video nakal apa aja ke aku", "BONUS: Lempar dadu 1x lagi!",
            "TRUTH: Apa yang kamu rasain pas aku manggil kamu 'Bunda'?", "MUNDUR 2 LANGKAH", "DARE: Kirim 3 foto selfie dengan ekspresi paling sange", "VC: Aku mau liat kamu lepas baju depan kamera pelan-pelan", "DARE: VN rintihan paling seksi yang bisa kamu buat",
            "TRUTH: Kapan terakhir kali kamu self-service sambil bayangin aku?", "DARE: Kirim pap pakaian dalam yang lagi dipake", "TRUTH: Sebutin satu hal yang pengen kamu lakuin tapi takut bilang ke aku", "DIA MAJU 2 LANGKAH", "VC: Kamu lakuin apa yang aku suruh di kamera",
            "TRUTH: Kamu lebih suka aku kasar atau lembut pas 'main'?", "BONUS: Lempar dadu 1x lagi!", "DARE: Kirim video full body dari bawah ke atas", "DARE: Kirim vn bisikan 'I'm yours' berkali-kali", "VC: Tunjukin area favorit aku ke kamera selama 30 detik",
            "DARE: Pap lidah kamu (pose seksi)", "TRUTH: Seberapa besar rasa sayang kamu ke aku (skala 1-100)?", "VC: Saling adu desah lewat suara aja tanpa gambar", "MAJU 3 LANGKAH", "DARE: Kirim pap lagi di kamar mandi",
            "MAJU 3 LANGKAH", "FREE: Minta video aku lagi ngelakuin apa aja", "VC: Kamu harus telanjang total di depan kamera selama 1 menit", "VC: Saling liatin area bawah masing-masing", "DIA MAJU 2 LANGKAH",
            "TRUTH: Apa ketakutan terbesar kamu tentang hubungan kita?", "DARE: Kirim video paling liar yang pernah kamu buat", "DARE: VN bilang 'Sayang, aku pengen kamu sekarang...'", "FREE: Kamu boleh minta 1 permintaan terakhir yang harus aku turutin", "FINISH: VC SAMPAI KLIMAKS BARENG & JANJI BAKAL SETIA!"
        ];

        const ladders = { 7: 29, 22: 41, 44: 76, 70: 92 };
        const snakes = { 32: 10, 62: 38, 89: 68, 97: 78 };

        let myRole = ""; 
        let state = { p1: 1, p2: 1, turn: 'cowo', lastChallenge: "", lastRoller: "", resetRequest: "" };

        function selectRole(r) {
            myRole = r;
            document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.remove('border-[#c5a059]', 'bg-[#c5a059]/10'));
            document.getElementById(`btn-${r}`).classList.add('border-[#c5a059]', 'bg-[#c5a059]/10');
            document.getElementById('start-btn').classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
        }

        function startGame() {
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            createBoard();
            listenDB();
        }

        function getCoords(num) {
            let row = Math.floor((num - 1) / 10);
            let col = (num - 1) % 10;
            if (row % 2 !== 0) col = 9 - col;
            let x = (col * 10) + 5;
            let y = 95 - (row * 10);
            return {x, y};
        }

        function createBoard() {
            const board = document.getElementById('board');
            const svgOverlay = document.getElementById('svg-overlay');
            board.innerHTML = '<svg id="svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>';

            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num = (row % 2 === 0) ? (row * 10) + (col + 1) : (row * 10) + (10 - col);
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.id = `c-${num}`; 
                    cell.innerHTML = `<span class="cell-number">${num}</span>`;
                    board.appendChild(cell);
                }
            }

            let svgHTML = '';
            Object.keys(ladders).forEach(start => {
                let s = getCoords(parseInt(start)); let e = getCoords(ladders[start]);
                svgHTML += `<line x1="${s.x}" y1="${s.y}" x2="${e.x}" y2="${e.y}" stroke="#b45309" stroke-width="1.5" opacity="0.6" stroke-dasharray="2"/>`;
            });
            Object.keys(snakes).forEach(start => {
                let s = getCoords(parseInt(start)); let e = getCoords(snakes[start]);   
                svgHTML += `<path d="M ${s.x} ${s.y} Q ${(s.x+e.x)/2 + 10} ${(s.y+e.y)/2} ${e.x} ${e.y}" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.6" />`;
            });
            document.getElementById('svg-overlay').innerHTML = svgHTML;
        }

        function listenDB() {
            db.collection("games").doc(GAME_ID).onSnapshot((doc) => {
                if (doc.exists) { 
                    state = doc.data(); 
                    syncUI(); 
                } else { 
                    db.collection("games").doc(GAME_ID).set(state); 
                }
            });
        }

        function syncUI() {
            document.getElementById('pos-1').innerText = state.p1;
            document.getElementById('pos-2').innerText = state.p2;
            
            document.querySelectorAll('.pion').forEach(p => p.remove());
            const c1 = document.getElementById(`c-${state.p1}`);
            const c2 = document.getElementById(`c-${state.p2}`);
            if(c1) { let p1Div = document.createElement('div'); p1Div.className = 'pion pion-cowo'; c1.appendChild(p1Div); }
            if(c2) { let p2Div = document.createElement('div'); p2Div.className = 'pion pion-cewe'; c2.appendChild(p2Div); }
            
            const btn = document.getElementById('roll-btn');
            const info = document.getElementById('turn-info');
            if (state.turn === myRole) { 
                btn.disabled = false; info.innerText = "Giliran Kamu"; info.className = "text-[#c5a059] text-[10px] font-black uppercase tracking-widest";
            } else { 
                btn.disabled = true; info.innerText = `Giliran ${state.turn.toUpperCase()}`; info.className = "text-gray-600 text-[10px] font-bold uppercase tracking-widest";
            }
            
            if (state.lastChallenge && state.lastChallenge !== "") {
                const isTruth = state.lastChallenge.startsWith("TRUTH");
                const isDare = state.lastChallenge.startsWith("DARE");
                document.getElementById('card-type').innerText = isTruth ? "TRUTH" : (isDare ? "DARE" : "RITUAL");
                document.getElementById('modal-desc').innerText = state.lastChallenge;
                document.getElementById('modal').classList.remove('hidden');
            } else {
                document.getElementById('modal').classList.add('hidden');
                document.getElementById('card-inner').classList.remove('is-flipped');
            }

            // Reset Logic
            const resetModal = document.getElementById('reset-modal');
            if (state.resetRequest && state.resetRequest !== "") {
                resetModal.classList.remove('hidden');
                if (state.resetRequest === myRole) {
                    document.getElementById('reset-text').innerText = "Menunggu persetujuan dia...";
                    document.getElementById('reset-actions').innerHTML = `<button onclick="cancelReset()" class="w-full py-3 border border-red-500/50 text-red-500 rounded-full font-black text-[10px]">BATAL</button>`;
                } else {
                    document.getElementById('reset-text').innerText = "Dia mengajak mengulang ritual. Setuju?";
                    document.getElementById('reset-actions').innerHTML = `
                        <button onclick="cancelReset()" class="flex-1 py-3 border border-red-500/50 text-red-500 rounded-full font-black text-[10px]">TOLAK</button>
                        <button onclick="confirmReset()" class="flex-1 py-3 bg-[#c5a059] text-black rounded-full font-black text-[10px]">SETUJU</button>`;
                }
            } else { resetModal.classList.add('hidden'); }
        }

        function rollDice() {
            const dice = document.getElementById('dice-box');
            dice.classList.add('shake'); dice.innerText = "...";
            
            setTimeout(() => {
                const roll = Math.floor(Math.random() * 6) + 1;
                dice.innerText = roll; dice.classList.remove('shake');
                
                let np1 = state.p1, np2 = state.p2;
                if (myRole === 'cowo') np1 = Math.min(np1 + roll, 100); 
                else np2 = Math.min(np2 + roll, 100);
                
                let currentPos = (myRole === 'cowo') ? np1 : np2;
                db.collection("games").doc(GAME_ID).update({ p1: np1, p2: np2, lastChallenge: "", lastRoller: myRole });

                setTimeout(() => {
                    let finalPos = currentPos;
                    if (ladders[currentPos]) finalPos = ladders[currentPos];
                    else if (snakes[currentPos]) finalPos = snakes[currentPos];

                    if (myRole === 'cowo') np1 = finalPos; else np2 = finalPos;
                    db.collection("games").doc(GAME_ID).update({ p1: np1, p2: np2, lastChallenge: allChallenges[finalPos - 1] });
                }, 800);
            }, 600);
        }

        function flipCard() { document.getElementById('card-inner').classList.add('is-flipped'); }
        function closeModal() {
            document.getElementById('card-inner').classList.remove('is-flipped');
            setTimeout(() => {
                if (state.lastRoller === myRole) {
                    let nextTurn = (myRole === 'cowo') ? 'cewe' : 'cowo';
                    if (state.lastChallenge.includes("BONUS")) nextTurn = myRole;
                    
                    let np1 = state.p1, np2 = state.p2;
                    let text = state.lastChallenge;
                    if (text.includes("MAJU 2")) { if(myRole==='cowo') np1+=2; else np2+=2; }
                    if (text.includes("DIA MAJU 1")) { if(myRole==='cowo') np2+=1; else np1+=1; }

                    db.collection("games").doc(GAME_ID).update({ p1: np1, p2: np2, lastChallenge: "", turn: nextTurn });
                }
            }, 400);
        }

        function requestReset() { db.collection("games").doc(GAME_ID).update({ resetRequest: myRole }); }
        function cancelReset() { db.collection("games").doc(GAME_ID).update({ resetRequest: "" }); }
        function confirmReset() { 
            db.collection("games").doc(GAME_ID).set({ p1: 1, p2: 1, turn: 'cowo', lastChallenge: "", lastRoller: "", resetRequest: "" }); 
        }
    </script>
</body>
</html>
