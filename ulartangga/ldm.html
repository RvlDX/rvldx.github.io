    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;900&display=swap');
        :root { --gold: #c5a059; --charcoal: #050505; --crimson: #dc2626; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--charcoal); 
            color: #e5e7eb; 
            margin: 0; padding: 0;
            position: fixed; width: 100vw; height: 100dvh; overflow: hidden; 
        }
        .serif { font-family: 'Playfair Display', serif; }

        header { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 40; }
        footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: #000; border-top: 1px solid rgba(255,255,255,0.05); z-index: 40; }

        .board-wrapper {
            position: absolute;
            top: 110px; bottom: 130px; left: 0; right: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .board-container {
            position: relative;
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 1.5px;
            width: 100%; max-width: 95vw; max-height: 100%; aspect-ratio: 1/1;
            background: rgba(197, 160, 89, 0.4); 
            padding: 2.5px; border-radius: 6px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.15);
        }

        #svg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.9));
        }

        .cell {
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: #f3f4f6; background: #0a0a0a;
            border-radius: 2px; overflow: hidden;
            text-shadow: 0 0 3px #000, 0 0 5px #000; z-index: 10; text-align: center;
        }
        
        .cell-number { z-index: 20; position: relative; opacity: 0.8;}
        
        .pion {
            width: 14px; height: 14px; border-radius: 50%; position: absolute;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid #fff; box-shadow: 0 0 12px rgba(0,0,0,1);
        }
        .pion-cowo { background-color: var(--gold); top: 8%; left: 8%; z-index: 30; }
        .pion-cewe { background-color: var(--crimson); bottom: 8%; right: 8%; z-index: 31; }
        
        .perspective { perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-front { background: var(--gold); cursor: pointer; }
        .card-back { transform: rotateY(180deg); background: #111; border: 2px solid var(--gold); padding: 15px; text-align: center; }
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    </style>
</head>

        // KOORDINAT ULAR & TANGGA
        const ladders = { 7: 29, 22: 41, 44: 76, 70: 92 }; // Tangga naik

        let myRole = ""; 
        let state = { p1: 1, p2: 1, turn: 'cowo', lastChallenge: "", lastRoller: "", resetRequest: "" };

        function selectRole(r) {
            myRole = r;
            document.querySelectorAll('[id^="btn-"]').forEach(el => el.classList.replace('border-[var(--gold)]', 'border-white/10'));
            document.getElementById(`btn-${r}`).classList.replace('border-white/10', 'border-[var(--gold)]');

        function startGame() {

                document.getElementById('selection-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                createBoard();
                listenDB();
            }, 500);
        }

        function getCoords(num) {
            let row = Math.floor((num - 1) / 10);
            let col = (num - 1) % 10;
            if (row % 2 !== 0) col = 9 - col;
            let x = (col * 10) + 5;
            let y = 95 - (row * 10);
            return {x, y};
        }

        function createBoard() {
            const board = document.getElementById('board');
            const svgOverlay = document.getElementById('svg-overlay');

            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num = (row % 2 === 0) ? (row * 10) + (col + 1) : (row * 10) + (10 - col);
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.id = `c-${num}`; 
                    
                    let content = `<span class="cell-number">${num}</span>`;
                    let text = allChallenges[num - 1].toLowerCase();
                    
                    // ICON LOGIC UPDATED FOR LDM
                    if(text.includes('video') || text.includes('rekam') || text.includes('pap') || text.includes('vn') || text.includes('vc sex') || text.includes('foto')) {
                        content += `<svg class="absolute opacity-40 w-5 h-5" fill="none" stroke="#ff4d4d" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"/><rect x="3" y="6" width="12" height="12" rx="2" stroke-width="2.5"/></svg>`;
                    } else if(text.includes('maju') || text.includes('mundur') || text.includes('bonus')) {
                        content += `<svg class="absolute opacity-50 w-5 h-5" fill="none" stroke="var(--gold)" viewBox="0 0 24 24"><path stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>`;
                    } else if(text.includes('telanjang') || text.includes('lepas') || text.includes('pakaian')) {
                        content += `<svg class="absolute opacity-40 w-5 h-5" fill="none" stroke="#ffffff" viewBox="0 0 24 24"><path stroke-width="2" d="M20.38 3.46L16 2a8.96 8.96 0 0 0-8 0l-4.38 1.46A2 2 0 0 0 2.26 5.3l1.4 6.6a2 2 0 0 0 1.96 1.58h1.22v8.5a2 2 0 0 0 2 2h6.32a2 2 0 0 0 2-2v-8.5h1.22a2 2 0 0 0 1.96-1.58l1.4-6.6a2 2 0 0 0-1.36-1.84z"/></svg>`;
                    } else if(text.includes('ketik') || text.includes('pesan') || text.includes('spill')) {
                        content += `<svg class="absolute opacity-50 w-5 h-5" fill="none" stroke="#ff9f43" viewBox="0 0 24 24"><path stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"/></svg>`;
                    }

                    cell.innerHTML = content;
                    board.appendChild(cell);
                }
            }

            let svgHTML = '';
            
            // GAMBAR TANGGA KAYU 3D
            Object.keys(ladders).forEach(start => {
                let s = getCoords(parseInt(start)); let e = getCoords(ladders[start]);
                let dx = e.x - s.x; let dy = e.y - s.y; let angle = Math.atan2(dy, dx);
                let ox = Math.cos(angle + Math.PI/2) * 2.5; let oy = Math.sin(angle + Math.PI/2) * 2.5;
                
                svgHTML += `<line x1="${s.x-ox}" y1="${s.y-oy}" x2="${e.x-ox}" y2="${e.y-oy}" stroke="#b45309" stroke-width="2" opacity="0.9" stroke-linecap="round"/>`;
                svgHTML += `<line x1="${s.x+ox}" y1="${s.y+oy}" x2="${e.x+ox}" y2="${e.y+oy}" stroke="#b45309" stroke-width="2" opacity="0.9" stroke-linecap="round"/>`;
                
                let steps = 6;
                for(let i=1; i<=steps; i++) {
                    let rx = s.x + dx * (i/(steps+1)); let ry = s.y + dy * (i/(steps+1));
                    svgHTML += `<line x1="${rx-ox}" y1="${ry-oy}" x2="${rx+ox}" y2="${ry+oy}" stroke="#d97706" stroke-width="1.5" opacity="0.9" stroke-linecap="round"/>`;
                }
            });

            // GAMBAR ULAR BENERAN (Bentuk S, Kepala, Mata, Lidah)
            Object.keys(snakes).forEach(start => {
                let s = getCoords(parseInt(start)); // Kepala
                let e = getCoords(snakes[start]);   // Ekor
                
                let dx = e.x - s.x; let dy = e.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let nx = -dy/dist; let ny = dx/dist;
                
                let curveStrength = 12; // Kekuatan liukan ular
                let cp1x = s.x + dx*0.3 + nx*curveStrength;
                let cp1y = s.y + dy*0.3 + ny*curveStrength;
                let cp2x = s.x + dx*0.7 - nx*curveStrength;
                let cp2y = s.y + dy*0.7 - ny*curveStrength;

                // Badan ular & corak
                svgHTML += `<path d="M ${s.x} ${s.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${e.x} ${e.y}" fill="none" stroke="#dc2626" stroke-width="4.5" stroke-linecap="round" opacity="0.9" />`;
                svgHTML += `<path d="M ${s.x} ${s.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${e.x} ${e.y}" fill="none" stroke="#7f1d1d" stroke-width="4.5" stroke-dasharray="2 4" stroke-linecap="round" opacity="0.8" />`;
                
                // Kepala dan Arah hadap
                let angle = Math.atan2(cp1y - s.y, cp1x - s.x) * 180 / Math.PI;
                svgHTML += `<g transform="translate(${s.x}, ${s.y}) rotate(${angle})">
                    <path d="M -2 0 L -6 -2 M -2 0 L -6 2" stroke="#ff0000" stroke-width="0.8" fill="none" /> <ellipse cx="1" cy="0" rx="3.5" ry="2.5" fill="#dc2626" /> <ellipse cx="1" cy="0" rx="3.5" ry="2.5" fill="none" stroke="#7f1d1d" stroke-width="0.5" />
                    <circle cx="2" cy="-1.2" r="0.6" fill="#fff" /><circle cx="2" cy="-1.2" r="0.2" fill="#000" /> <circle cx="2" cy="1.2" r="0.6" fill="#fff" /><circle cx="2" cy="1.2" r="0.2" fill="#000" /> </g>`;
            });

            svgOverlay.innerHTML = svgHTML;
        }

        function listenDB() {
            db.collection("games").doc(GAME_ID).onSnapshot((doc) => {
                if (doc.exists) { 
                    state = doc.data(); 
                    syncUI(); 
                } else { 
                    state.turn = Math.random() < 0.5 ? 'cowo' : 'cewe';
                    db.collection("games").doc(GAME_ID).set(state); 
                }
            });
        }

        function syncUI() {
            document.getElementById('pos-1').innerText = state.p1;
            document.getElementById('pos-2').innerText = state.p2;
            
            document.querySelectorAll('.pion').forEach(p => p.remove());
            const c1 = document.getElementById(`c-${state.p1}`);
            const c2 = document.getElementById(`c-${state.p2}`);
            if(c1) { let p1Div = document.createElement('div'); p1Div.className = 'pion pion-cowo'; c1.appendChild(p1Div); }
            if(c2) { let p2Div = document.createElement('div'); p2Div.className = 'pion pion-cewe'; c2.appendChild(p2Div); }
            
            const btn = document.getElementById('roll-btn');
            const info = document.getElementById('turn-info');
            if (state.turn === myRole) { 
                btn.disabled = false; info.innerText = "Gilirannya kamu!"; info.style.color = 'var(--gold)'; 
            } else { 
                btn.disabled = true; info.innerText = `Menunggu ${state.turn.toUpperCase()}...`; info.style.color = '#777'; 
            }
            
            document.getElementById('ui-cowo').style.opacity = state.turn === 'cowo' ? "1" : "0.2";
            document.getElementById('ui-cewe').style.opacity = state.turn === 'cewe' ? "1" : "0.2";
            
            if (state.lastChallenge && state.lastChallenge !== "") {
                document.getElementById('modal-desc').innerText = `"${state.lastChallenge}"`;
                document.getElementById('modal').style.display = 'flex';
            } else {
                document.getElementById('modal').style.display = 'none';
                document.getElementById('card-inner').classList.remove('is-flipped');
            }

            const resetModal = document.getElementById('reset-modal');
            const resetText = document.getElementById('reset-text');
            const resetActions = document.getElementById('reset-actions');

            if (state.resetRequest && state.resetRequest !== "") {
                resetModal.classList.remove('hidden');
                if (state.resetRequest === myRole) {
                    resetText.innerText = "Menunggu persetujuan pasangan...";
                    resetActions.innerHTML = `<button onclick="cancelReset()" class="w-full py-3 border border-red-500/50 text-red-500 rounded-full font-black uppercase text-[10px] active:scale-95">Batal Request</button>`;
                } else {
                    resetText.innerText = "Pasanganmu mengajak untuk mengulang ritual dari awal. Setuju?";
                    resetActions.innerHTML = `
                        <button onclick="cancelReset()" class="flex-1 py-3 border border-red-500/50 text-red-500 rounded-full font-black uppercase text-[10px] active:scale-95">Tolak</button>
                        <button onclick="confirmReset()" class="flex-1 py-3 bg-[#c5a059] text-black rounded-full font-black uppercase text-[10px] active:scale-95">Setuju</button>
                    `;
                }
            } else {
                resetModal.classList.add('hidden');
            }
        }

        function requestReset() {
            if(state.resetRequest) return; 
            db.collection("games").doc(GAME_ID).update({ resetRequest: myRole });
        }

        function confirmReset() {
            const randomTurn = Math.random() < 0.5 ? 'cowo' : 'cewe';
            db.collection("games").doc(GAME_ID).update({
                p1: 1, p2: 1, turn: randomTurn, lastChallenge: "", lastRoller: "", resetRequest: ""
            });
        }

        function cancelReset() {
            db.collection("games").doc(GAME_ID).update({ resetRequest: "" });
        }

        function rollDice() {
            const dice = document.getElementById('dice-box');
            dice.classList.add('shake'); dice.innerText = "...";
            setTimeout(() => {
                const roll = Math.floor(Math.random() * 6) + 1;
                dice.innerText = roll; dice.classList.remove('shake');
                
                let np1 = state.p1, np2 = state.p2;
                if (myRole === 'cowo') np1 = Math.min(np1 + roll, 100); 
                else np2 = Math.min(np2 + roll, 100);
                
                let posisiBaru = (myRole === 'cowo') ? np1 : np2;
                const task = allChallenges[posisiBaru - 1]; 

                db.collection("games").doc(GAME_ID).update({ 
                    p1: np1, p2: np2, lastChallenge: task, lastRoller: myRole
                });
            }, 600);
        }

        function flipCard() { document.getElementById('card-inner').classList.add('is-flipped'); }
        
        function closeModal() {
            document.getElementById('card-inner').classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('modal').style.display = 'none';
                
                if (state.lastRoller === myRole && state.lastChallenge !== "") {
                    let taskText = state.lastChallenge.toLowerCase();
                    let np1 = state.p1; let np2 = state.p2;
                    let nextTurn = (myRole === 'cowo') ? 'cewe' : 'cowo';
                    let newTask = ""; 
                    
                    let moves = 0; let target = null;
                    if (taskText.includes("dia maju")) { let m = taskText.match(/dia maju (\d+)/); if(m){moves=parseInt(m[1]); target=(myRole==='cowo'?'cewe':'cowo');} }
                    else if (taskText.includes("dia mundur")) { let m = taskText.match(/dia mundur (\d+)/); if(m){moves=-parseInt(m[1]); target=(myRole==='cowo'?'cewe':'cowo');} }
                    else if (taskText.includes("maju")) { let m = taskText.match(/maju (\d+)/); if(m){moves=parseInt(m[1]); target=myRole;} }
                    else if (taskText.includes("mundur")) { let m = taskText.match(/mundur (\d+)/); if(m){moves=-parseInt(m[1]); target=myRole;} }

                    if (taskText.includes("lempar dadu")) nextTurn = myRole; 

                    let willPullNewCard = false;

                    if (target !== null && moves !== 0) {
                        if (target === 'cowo') np1 = Math.min(Math.max(np1 + moves, 1), 100);
                        else np2 = Math.min(Math.max(np2 + moves, 1), 100);
                        if (target === myRole) { willPullNewCard = true; nextTurn = myRole; }
                    }

                    let currentPos = (myRole === 'cowo') ? np1 : np2;
                    if (ladders[currentPos]) {
                        if (myRole === 'cowo') np1 = ladders[currentPos]; else np2 = ladders[currentPos];
                        willPullNewCard = true; nextTurn = myRole;
                    } else if (snakes[currentPos]) {
                        if (myRole === 'cowo') np1 = snakes[currentPos]; else np2 = snakes[currentPos];
                        willPullNewCard = true; nextTurn = myRole;
                    }

                    if (willPullNewCard) {
                        let finalPos = (myRole === 'cowo') ? np1 : np2;
                        
                        // HAPUS KARTU LAMA BIAR PION JALAN DULU
                        db.collection("games").doc(GAME_ID).update({ 
                            p1: np1, p2: np2, lastChallenge: "", turn: nextTurn 
                        });

                        // DELAY 1 DETIK, LALU TARIK KARTU BARU (Beruntun)
                        setTimeout(() => {
                            db.collection("games").doc(GAME_ID).update({ 
                                lastChallenge: allChallenges[finalPos - 1] 
                            });
                        }, 1000);
                        
                    } else {
                        db.collection("games").doc(GAME_ID).update({ 
                            p1: np1, p2: np2, lastChallenge: "", turn: nextTurn 
                        });
                    }
                }
            }, 400); 
        }
    </script>
</body>
</html>
